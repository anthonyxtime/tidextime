const BUOYS = [

  {region:"S. California",id:"46025",name:"Santa Monica Basin"},

// ─── Chart geometry ───────────────────────────────────────────────────────────
// 3 days laid side by side. "Absolute minutes": 0=yesterday midnight.
const N_DAYS = 3, DAY_PX = 420, L_PAD = 38, R_PAD = 8;
const SVG_W  = L_PAD + N_DAYS * DAY_PX + R_PAD;      // 1294

const T_TOP = 20, T_CH = 150, T_BOT = 6;
const T_H   = T_TOP + T_CH + T_BOT;                   // 176  (tide section height)

const S_TOP = 8,  S_CH = 76,  S_BOT = 4;
const S_H   = S_TOP + S_CH + S_BOT;                   // 88   (swell section height)

const AX_H  = 22;                                      // time-axis strip
const SVG_H = T_H + S_H + AX_H;                       // 286

const SEP_Y = T_H;                                     // y where tide ends / swell begins

const xOf  = am  => L_PAD + am * (DAY_PX / 1440);
const yT   = (v, yMin, yMax) => T_TOP + T_CH - ((v - yMin) / (yMax - yMin)) * T_CH;
const yS   = (v, sMax)       => SEP_Y + S_TOP + S_CH - (v / Math.max(sMax, 3)) * S_CH;

const Y_FIXED_MIN   = -1, Y_FIXED_MAX = 7;
const Y_FIXED_TICKS = [-1,0,1,2,3,4,5,6,7];
const H_TICKS = [0,3,6,9,12,15,18,21];
const H_LBLS  = ["12a","3a","6a","9a","12p","3p","6p","9p"];

// ─── Moon phase ───────────────────────────────────────────────────────────────
function moonPhase(date){
  const k=new Date(2000,0,6,18,14,0),cy=29.530588853;
  return(((date-k)/86400000)%cy+cy)%cy;
}
const MTAB=[[1.85,"🌑","New Moon"],[5.54,"🌒","Waxing Crescent"],[9.22,"🌓","First Quarter"],
  [12.91,"🌔","Waxing Gibbous"],[16.61,"🌕","Full Moon"],[20.30,"🌖","Waning Gibbous"],
  [23.99,"🌗","Last Quarter"],[99,"🌘","Waning Crescent"]];
const moonInfo=p=>MTAB.find(([m])=>p<m)||MTAB[7];

// ─── Sun times ────────────────────────────────────────────────────────────────
function sunTimes(lat,lon,date){
  const toR=d=>d*Math.PI/180;
  const N=Math.floor((date-new Date(date.getFullYear(),0,0))/86400000);
  const B=toR(360/365*(N-81));
  const EqT=9.87*Math.sin(2*B)-7.53*Math.cos(B)-1.5*Math.sin(B);
  const decl=toR(23.45*Math.sin(toR(360/365*(N-81))));
  const latR=toR(lat);
  const noon=720-4*lon-EqT-date.getTimezoneOffset();
  const hs=alt=>{
    const c=(Math.sin(toR(alt))-Math.sin(latR)*Math.sin(decl))/(Math.cos(latR)*Math.cos(decl));
    return(c>=1||c<=-1)?null:Math.acos(c)*(180/Math.PI)*4;
  };
  const sr=hs(-0.833),ct=hs(-6);
  if(!sr)return{fl:0,sr:0,ss:1440,ll:1440};
  return{fl:Math.round(noon-(ct??sr+30)),sr:Math.round(noon-sr),ss:Math.round(noon+sr),ll:Math.round(noon+(ct??sr+30))};
}

// ─── Catmull-Rom spline (tide hi/lo → smooth curve) ─────────────────────────
function interpTide(pts,am){
  if(!pts?.length)return 0;
  if(am<=pts[0].am)return pts[0].v;
  if(am>=pts[pts.length-1].am)return pts[pts.length-1].v;
  let i=0;while(i<pts.length-1&&pts[i+1].am<am)i++;
  const p0=pts[Math.max(0,i-1)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(pts.length-1,i+2)];
  const t=(am-p1.am)/(p2.am-p1.am),t2=t*t,t3=t2*t;
  return 0.5*(2*p1.v+(-p0.v+p2.v)*t+(2*p0.v-5*p1.v+4*p2.v-p3.v)*t2+(-p0.v+3*p1.v-3*p2.v+p3.v)*t3);
}

// Linear interpolation for hourly buoy data
function interpBuoy(pts,am){
  if(!pts?.length)return 0;
  if(am<=pts[0].am)return pts[0].wh;
  if(am>=pts[pts.length-1].am)return pts[pts.length-1].wh;
  let i=0;while(i<pts.length-1&&pts[i+1].am<=am)i++;
  const p1=pts[i],p2=pts[i+1],t=(am-p1.am)/(p2.am-p1.am);
  return p1.wh+(p2.wh-p1.wh)*t;
}

// ─── Realistic demo buoy data (3 days, hourly) ────────────────────────────────
// Solid line up to "now", dashed thereafter — mimics a growing live reading.
function genBuoyDemo(id){
  const seed=parseInt(id.replace(/\D/g,""))%97;
  const base=1.3+(seed%20)*0.07;
  const pts=[];
  for(let am=0;am<=N_DAYS*1440;am+=60){
    const h=am/60;
    const wh=Math.max(0.2,
      base+0.5*Math.sin(h*0.17+seed*0.09)
          +0.3*Math.cos(h*0.35)
          +0.12*Math.sin(h*0.7+seed*0.04));
    pts.push({am,wh});
  }
  return pts;
}

// ─── Demo tide hi/lo fallback (Santa Monica–ish, 3 days) ─────────────────────
const DEMO_HL=[0,1,2].flatMap(d=>[
  {am:d*1440+327, v:4.30+d*0.04,type:"H"},
  {am:d*1440+745, v:-0.18+d*0.02,type:"L"},
  {am:d*1440+1152,v:4.38-d*0.03,type:"H"},
]);

// ─── Helpers ─────────────────────────────────────────────────────────────────
const ftToM=(v)=>v*0.3048;
const cvt=(v,m)=>m?ftToM(v):v;
const fmtV=(v,m)=>cvt(v,m).toFixed(2);
const fmtVs=(v,m)=>`${cvt(v,m).toFixed(1)} ${m?"m":"ft"}`;
const uLbl=m=>m?"m":"ft";

function fmtTime(am,short=false){
  const h=Math.floor(am%1440/60)%24,mm=Math.round(am%60),ap=h>=12?"PM":"AM";
  return short?`${h%12||12}:${String(mm).padStart(2,"0")}${ap.toLowerCase()}`:`${h%12||12}:${String(mm).padStart(2,"0")} ${ap}`;
}
const nowLocal=()=>new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:true});
const nowUTC=()=>{const d=new Date();return`${String(d.getUTCHours()).padStart(2,"0")}:${String(d.getUTCMinutes()).padStart(2,"0")} UTC`;};
const dateFmt=d=>`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
const dateKey=d=>d.toISOString().slice(0,10).replace(/-/g,"");

// ─── Main component ───────────────────────────────────────────────────────────
function TideTrack(){
  const today=new Date();
  const yest=new Date(today);yest.setDate(today.getDate()-1);
  const tmrw=new Date(today);tmrw.setDate(today.getDate()+1);
  const nowAM=1440+today.getHours()*60+today.getMinutes();

  const [stIdx,   setStIdx]   =useState(0);
  const [hlPts,   setHlPts]   =useState(null);
  const [loading, setLoading] =useState(true);
  const [isDemo,  setIsDemo]  =useState(false);
  const [cursor,  setCursor]  =useState(nowAM);
  const [metric,  setMetric]  =useState(false);
  const [expanded,setExpanded]=useState(false);
  const [selBuoys,setSelBuoys]=useState(["46025"]);
  const [showPick,setShowPick]=useState(false);
  const [showBuoy,setShowBuoy]=useState(false);
  const [showMoon,setShowMoon]=useState(true);
  const [,tick]               =useState(0);

  const scrollEl=useRef(null);
  const ptrStart=useRef(null);

  const st=STATIONS[stIdx];
  const suns=[yest,today,tmrw].map(d=>sunTimes(st.lat,st.lon,d));
  const ph=moonPhase(today);
  const [,mEmoji,mName]=moonInfo(ph);
  const isSpring=ph<3||ph>27||(ph>13&&ph<17);

  // Clock
  useEffect(()=>{const id=setInterval(()=>tick(n=>n+1),30000);return()=>clearInterval(id);},[]);

  // Fetch 3-day NOAA tide hi/lo
  useEffect(()=>{
    setLoading(true);setHlPts(null);setExpanded(false);
    const yKey=dateKey(yest),tKey=dateKey(today),mKey=dateKey(tmrw);
    const url=`https://api.tidesandcurrents.noaa.gov/api/prod/datagetter`+
      `?begin_date=${dateFmt(yest)}&end_date=${dateFmt(tmrw)}`+
      `&station=${st.id}&product=predictions&datum=MLLW`+
      `&time_zone=lst_ldt&interval=hilo&units=english&application=tidetrack&format=json`;
    fetch(url).then(r=>r.json()).then(data=>{
      if(data.predictions){
        const pts=data.predictions.map(p=>{
          const dk=p.t.slice(0,10).replace(/-/g,"");
          const di=dk===yKey?0:dk===tKey?1:2;
          const[hh,mm]=p.t.slice(11,16).split(":").map(Number);
          return{am:di*1440+hh*60+mm,v:parseFloat(p.v),type:p.type};
        }).sort((a,b)=>a.am-b.am);
        setHlPts(pts);setIsDemo(false);
      }else{setHlPts(DEMO_HL);setIsDemo(true);}
      setLoading(false);
    }).catch(()=>{setHlPts(DEMO_HL);setIsDemo(true);setLoading(false);});
  },[stIdx]);

  // Auto-scroll to center "now" once data loads
  useEffect(()=>{
    if(!loading&&scrollEl.current){
      const nowX=xOf(nowAM);
      scrollEl.current.scrollLeft=nowX-scrollEl.current.clientWidth/2;
    }
  },[loading]);

  // Y-axis
  const dMin=hlPts?Math.min(...hlPts.map(h=>h.v)):0;
  const dMax=hlPts?Math.max(...hlPts.map(h=>h.v)):5;
  const needsExp=dMin<Y_FIXED_MIN+0.1||dMax>Y_FIXED_MAX-0.1;
  const yMin=expanded?dMin-0.8:Y_FIXED_MIN;
  const yMax=expanded?dMax+0.8:Y_FIXED_MAX;
  const yRange=yMax-yMin;
  let yTicks;
  if(!expanded){yTicks=Y_FIXED_TICKS;}
  else{const s=yRange>16?4:yRange>8?2:1;yTicks=[];for(let v=Math.ceil(yMin/s)*s;v<=yMax;v+=s)yTicks.push(v);}
  const yTV=v=>yT(v,yMin,yMax);

  // Tide curve (every 10 min across 3 days)
  const tCurve=hlPts?Array.from({length:433},(_,i)=>({am:i*10,v:interpTide(hlPts,i*10)})):[];
  const tPath=tCurve.length?"M "+tCurve.map(p=>`${xOf(p.am).toFixed(1)},${yTV(p.v).toFixed(1)}`).join(" L "):"";
  const tArea=tPath?`${tPath} L ${xOf(N_DAYS*1440)},${yTV(yMin)} L ${xOf(0)},${yTV(yMin)} Z`:"";

  // Buoy data
  const buoyData=selBuoys.map(id=>({id,pts:genBuoyDemo(id)}));
  const swMax=Math.max(4,...buoyData.flatMap(b=>b.pts.map(p=>p.wh)));
  const ySV=v=>yS(v,swMax);

  // Cursor
  const selTide=hlPts?interpTide(hlPts,cursor):0;
  const curDay=Math.floor(cursor/1440);
  const curDayLbl=curDay===0?"Yesterday":curDay===1?"Today":"Tomorrow";
  const nextHL=hlPts?.find(p=>p.am>nowAM);
  const nowX=xOf(nowAM),curX=xOf(cursor);

  // Tap-to-set-cursor (ignore drags)
  const onPtrDown=e=>{ptrStart.current=e.clientX;};
  const onChartClick=e=>{
    if(ptrStart.current!==null&&Math.abs(e.clientX-ptrStart.current)>8)return;
    if(!scrollEl.current)return;
    const rect=scrollEl.current.getBoundingClientRect();
    const svgX=e.clientX-rect.left+scrollEl.current.scrollLeft;
    const am=(svgX-L_PAD)*(1440/DAY_PX);
    setCursor(Math.max(0,Math.min(N_DAYS*1440-1,Math.round(am))));
  };

  // Buoy toggle (max 3)
  const toggleBuoy=id=>setSelBuoys(prev=>
    prev.includes(id)?prev.filter(b=>b!==id):prev.length<3?[...prev,id]:prev
  );

  const stRegions=[...new Set(STATIONS.map(s=>s.region))];
  const bRegions=[...new Set(BUOYS.map(b=>b.region))];

  return(
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:"'Nunito',sans-serif",maxWidth:480,margin:"0 auto",paddingBottom:80,color:C.txt}}>
      <style>{`*{box-sizing:border-box}::-webkit-scrollbar{height:3px;width:3px;background:transparent}::-webkit-scrollbar-thumb{background:${C.border};border-radius:2px}@keyframes up{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}.u{animation:up .25s ease both}button{font-family:'Nunito',sans-serif;cursor:pointer;transition:transform .1s}button:active{transform:scale(.97)}`}</style>

      {/* HEADER */}
      <div style={{padding:"16px 16px 12px",background:C.card,borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:20,fontWeight:900,letterSpacing:-0.5,lineHeight:1}}>🌊 TideTrack</div>
            <div style={{fontSize:10,color:C.sub,marginTop:2}}>
              {today.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:14,fontWeight:800}}>{nowLocal()}</div>
            <div style={{fontSize:9,color:C.sub,fontFamily:"'DM Mono',monospace"}}>{nowUTC()}</div>
          </div>
        </div>

        {/* Station picker */}
        <div style={{marginTop:10,position:"relative"}}>
          <button onClick={()=>setShowPick(v=>!v)} style={{width:"100%",padding:"7px 12px",borderRadius:10,border:`1px solid ${C.border}`,background:"transparent",color:C.txt,fontSize:11,display:"flex",justifyContent:"space-between",alignItems:"center",fontWeight:700}}>
            <span>📍 {st.name}</span>
            <span style={{color:C.sub,fontWeight:400,fontSize:9}}>{showPick?"▲ close":"▼ change"}</span>
          </button>
          {showPick&&(
            <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:99,background:C.card,border:`1px solid ${C.border}`,borderRadius:10,maxHeight:230,overflowY:"auto",boxShadow:"0 6px 24px rgba(0,0,0,.1)"}}>
              {stRegions.map(region=>(
                <div key={region}>
                  <div style={{padding:"5px 12px 2px",fontSize:8,color:C.sub,letterSpacing:1.2,textTransform:"uppercase",borderTop:`1px solid ${C.border}`}}>{region}</div>
                  {STATIONS.map((s,i)=>s.region!==region?null:(
                    <button key={s.id} onClick={()=>{setStIdx(i);setShowPick(false);}} style={{width:"100%",padding:"6px 12px 6px 16px",border:"none",textAlign:"left",fontSize:11,background:i===stIdx?`${C.tide}18`:"transparent",color:i===stIdx?C.tide:C.txt,fontWeight:i===stIdx?800:400,borderLeft:`2px solid ${i===stIdx?C.tide:"transparent"}`}}>
                      {s.name}
                    </button>
                  ))}
                </div>
              ))}
            </div>
          )}
        </div>

        {isDemo&&<div style={{marginTop:6,display:"inline-block",padding:"2px 10px",borderRadius:20,fontSize:9,background:"#fff8e0",border:"1px solid #e8c040",color:"#a08020",fontWeight:700}}>⚠ Demo data — live NOAA tides load on GitHub Pages</div>}
      </div>

      {loading?(
        <div style={{padding:50,textAlign:"center",color:C.sub,fontSize:13,fontWeight:700}}>Loading tide data…</div>
      ):(<>

        {/* TIDE READING */}
        <div className="u" style={{padding:"12px 16px 10px",background:C.card,borderBottom:`1px solid ${C.border}`}}>
          <div style={{display:"flex",alignItems:"flex-end",gap:6,flexWrap:"wrap"}}>
            <div>
              <div style={{fontSize:9,color:C.sub,letterSpacing:.5,textTransform:"uppercase",marginBottom:2}}>
                {curDayLbl} · {fmtTime(cursor)}
              </div>
              <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:44,fontWeight:500,lineHeight:1,color:selTide>0?C.tide:"#b04040"}}>
                  {fmtV(selTide,metric)}
                </span>
                <span style={{fontSize:14,color:C.sub,fontWeight:700,marginBottom:3}}>{uLbl(metric)}</span>
                <span style={{fontSize:9,color:C.sub,marginBottom:4,marginLeft:2}}>MLLW</span>
              </div>
            </div>
            <div style={{marginLeft:"auto",display:"flex",gap:6,alignSelf:"center",paddingBottom:2}}>
              <button onClick={()=>setCursor(nowAM)} style={{padding:"4px 12px",borderRadius:20,border:`1.5px solid ${cursor===nowAM?C.tide:C.border}`,background:cursor===nowAM?`${C.tide}18`:C.card,color:cursor===nowAM?C.tide:C.sub,fontSize:10,fontWeight:800}}>Now</button>
              <button onClick={()=>setMetric(v=>!v)} style={{padding:"4px 12px",borderRadius:20,border:`1px solid ${C.border}`,background:C.card,color:C.sub,fontSize:10,fontWeight:700}}>{metric?"→ ft":"→ m"}</button>
              {needsExp&&<button onClick={()=>setExpanded(v=>!v)} style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${C.border}`,background:C.card,color:C.sub,fontSize:9,fontWeight:600}}>{expanded?"↕ Fix":"↕ Exp"}</button>}
            </div>
          </div>
          {nextHL&&<div style={{fontSize:10,color:C.sub,marginTop:3}}>{nextHL.type==="H"?"▲ Next high":"▼ Next low"}: {fmtVs(nextHL.v,metric)} at {fmtTime(nextHL.am)} · {Math.floor((nextHL.am-nowAM)/60)}h {(nextHL.am-nowAM)%60}m</div>}
        </div>

        {/* SCROLLABLE SVG CHART */}
        <div ref={scrollEl} onPointerDown={onPtrDown} onClick={onChartClick}
          style={{overflowX:"auto",overflowY:"hidden",WebkitOverflowScrolling:"touch",background:C.bg,cursor:"crosshair"}}>
          <svg width={SVG_W} height={SVG_H} style={{display:"block"}}>
            <defs>
              <linearGradient id="tG" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={C.tideA0}/><stop offset="100%" stopColor={C.tideA1}/>
              </linearGradient>
              {[0,1,2].map(d=>{
                const s=suns[d];
                return(<React.Fragment key={d}>
                  <linearGradient id={`dn${d}`} gradientUnits="userSpaceOnUse" x1={xOf(d*1440+s.fl)} y1="0" x2={xOf(d*1440+s.sr)} y2="0">
                    <stop offset="0%" stopColor={C.night}/><stop offset="100%" stopColor={C.dawn}/>
                  </linearGradient>
                  <linearGradient id={`dk${d}`} gradientUnits="userSpaceOnUse" x1={xOf(d*1440+s.ss)} y1="0" x2={xOf(d*1440+s.ll)} y2="0">
                    <stop offset="0%" stopColor={C.dawn}/><stop offset="100%" stopColor={C.night}/>
                  </linearGradient>
                </React.Fragment>);
              })}
            </defs>

            {/* ── Day/night background (tide section) ── */}
            <rect x={L_PAD} y={T_TOP} width={N_DAYS*DAY_PX} height={T_CH+T_BOT} fill={C.night}/>
            {[0,1,2].map(d=>{
              const s=suns[d];
              return(<React.Fragment key={d}>
                {s.sr<s.ss&&<rect x={xOf(d*1440+s.sr)} y={T_TOP} width={xOf(d*1440+s.ss)-xOf(d*1440+s.sr)} height={T_CH+T_BOT} fill={C.day}/>}
                {s.fl<s.sr&&<rect x={xOf(d*1440+s.fl)} y={T_TOP} width={xOf(d*1440+s.sr)-xOf(d*1440+s.fl)} height={T_CH+T_BOT} fill={`url(#dn${d})`}/>}
                {s.ss<s.ll&&<rect x={xOf(d*1440+s.ss)} y={T_TOP} width={xOf(d*1440+s.ll)-xOf(d*1440+s.ss)} height={T_CH+T_BOT} fill={`url(#dk${d})`}/>}
              </React.Fragment>);
            })}

            {/* ── Swell section background ── */}
            <rect x={L_PAD} y={SEP_Y} width={N_DAYS*DAY_PX} height={S_H} fill={C.card}/>
            {[0,1,2].map(d=>{
              const s=suns[d];
              return s.sr<s.ss?(<rect key={d} x={xOf(d*1440+s.sr)} y={SEP_Y} width={xOf(d*1440+s.ss)-xOf(d*1440+s.sr)} height={S_H} fill="#f5f9fd"/>):null;
            })}

            {/* ── Time-axis strip ── */}
            <rect x={0} y={SEP_Y+S_H} width={SVG_W} height={AX_H} fill={C.card}/>

            {/* ── Section separators ── */}
            <line x1={L_PAD} y1={SEP_Y} x2={SVG_W} y2={SEP_Y} stroke={C.border} strokeWidth="1"/>
            <line x1={L_PAD} y1={SEP_Y+S_H} x2={SVG_W} y2={SEP_Y+S_H} stroke={C.border} strokeWidth="0.5"/>

            {/* ── Day boundary lines ── */}
            {[1,2].map(d=><line key={d} x1={xOf(d*1440)} y1={T_TOP} x2={xOf(d*1440)} y2={SEP_Y+S_H} stroke={C.border} strokeWidth="1" strokeDasharray="4,3"/>)}

            {/* ── Day header labels ── */}
            {[["YESTERDAY",0],["TODAY",1],["TOMORROW",2]].map(([lbl,d])=>(
              <text key={lbl} x={xOf(d*1440+720)} y={T_TOP-7} textAnchor="middle" fill={d===1?C.tide:C.light} fontSize="8" fontWeight="700" letterSpacing="0.8" fontFamily="Nunito,sans-serif">{lbl}</text>
            ))}

            {/* ── Today highlight tint ── */}
            <rect x={xOf(1440)} y={T_TOP} width={DAY_PX} height={T_CH} fill="rgba(91,164,176,0.04)" pointerEvents="none"/>

            {/* ── Tide grid lines ── */}
            {yTicks.map(v=><line key={v} x1={L_PAD} y1={yTV(v)} x2={SVG_W-R_PAD} y2={yTV(v)} stroke={v===0?C.zero:C.border} strokeWidth="0.8" strokeDasharray={v===0?"4,3":"none"}/>)}

            {/* ── Swell grid lines ── */}
            {[1,2,3,4].map(v=>{const yv=ySV(v);return(yv>SEP_Y+4&&yv<SEP_Y+S_H-4)?<line key={v} x1={L_PAD} y1={yv} x2={SVG_W-R_PAD} y2={yv} stroke={C.border} strokeWidth="0.7"/>:null;})}

            {/* ── Tide area fill ── */}
            {tArea&&<path d={tArea} fill="url(#tG)"/>}

            {/* ── Tide curve ── */}
            {tPath&&<path d={tPath} fill="none" stroke={C.tide} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>}

            {/* ── Hi/Lo markers ── */}
            {hlPts?.map((p,i)=>{
              if(p.v<yMin||p.v>yMax)return null;
              const cx=xOf(p.am),cy=yTV(p.v),hi=p.type==="H";
              const nearTop=cy<T_TOP+22,nearBot=cy>T_TOP+T_CH-22;
              const flip=hi?nearTop:nearBot;
              const vY=flip?(hi?cy+14:cy-6):(hi?cy-6:cy+14);
              const tY=flip?(hi?cy+24:cy-16):(hi?cy-16:cy+24);
              return(<g key={i}>
                <circle cx={cx} cy={cy} r="3.5" fill={hi?C.tide:C.card} stroke={C.tide} strokeWidth="1.5"/>
                <text x={cx} y={vY} textAnchor="middle" fill={C.tide} fontSize="9" fontWeight="800" fontFamily="Nunito,sans-serif">{fmtVs(p.v,metric)}</text>
                <text x={cx} y={tY} textAnchor="middle" fill={C.sub} fontSize="8" fontFamily="DM Mono,monospace">{fmtTime(p.am,true)}</text>
              </g>);
            })}

            {/* ── Buoy swell lines ── */}
            {/* Past portion = solid line; future = dashed + faded (like Surfline) */}
            {buoyData.map((bd,bi)=>{
              const pastPts=bd.pts.filter(p=>p.am<=nowAM);
              const futurePts=bd.pts.filter(p=>p.am>=nowAM);
              const bridgeWH=interpBuoy(bd.pts,nowAM);
              const pp=pastPts.length?"M "+pastPts.map(p=>`${xOf(p.am).toFixed(1)},${ySV(p.wh).toFixed(1)}`).join(" L "):"";
              const fp=futurePts.length?"M "+[{am:nowAM,wh:bridgeWH},...futurePts].map(p=>`${xOf(p.am).toFixed(1)},${ySV(p.wh).toFixed(1)}`).join(" L "):"";
              return(<React.Fragment key={bd.id}>
                {pp&&<path d={pp} fill="none" stroke={C.buoy[bi]} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>}
                {fp&&<path d={fp} fill="none" stroke={C.buoy[bi]} strokeWidth="1.5" strokeDasharray="5,4" opacity="0.4"/>}
                {/* Dot at "now" on buoy line */}
                {<circle cx={xOf(nowAM)} cy={ySV(bridgeWH)} r="3" fill={C.buoy[bi]}/>}
              </React.Fragment>);
            })}

            {/* ── NOW marker ── */}
            <line x1={nowX} y1={T_TOP-2} x2={nowX} y2={SEP_Y+S_H} stroke={C.now} strokeWidth="1.5" opacity="0.65"/>
            <text x={nowX} y={T_TOP-8} textAnchor="middle" fill={C.now} fontSize="7" fontWeight="800" fontFamily="Nunito,sans-serif">NOW</text>

            {/* ── Cursor line + dot ── */}
            <line x1={curX} y1={T_TOP} x2={curX} y2={SEP_Y+S_H} stroke="rgba(80,60,40,.2)" strokeWidth="1" strokeDasharray="3,2"/>
            {(()=>{
              const rawCY=yTV(selTide);
              const cy=Math.max(T_TOP+4,Math.min(T_TOP+T_CH-4,rawCY));
              return<circle cx={curX} cy={cy} r="4.5" fill={C.card} stroke={C.tide} strokeWidth="2"/>;
            })()}

            {/* ── Y-axis: tide ── */}
            {yTicks.map(v=><text key={v} x={L_PAD-5} y={yTV(v)+3} textAnchor="end" fill={C.sub} fontSize="8" fontFamily="DM Mono,monospace">{v}</text>)}
            <text x={L_PAD-5} y={T_TOP-8} textAnchor="end" fill={C.light} fontSize="7">{uLbl(metric)}</text>

            {/* ── Y-axis: swell ── */}
            <text x={L_PAD-5} y={SEP_Y+S_TOP+6} textAnchor="end" fill={C.light} fontSize="7">ft</text>
            {[1,2,3,4].map(v=>{const yv=ySV(v);return(yv>SEP_Y+6&&yv<SEP_Y+S_H-4)?<text key={v} x={L_PAD-5} y={yv+3} textAnchor="end" fill={C.sub} fontSize="7" fontFamily="DM Mono,monospace">{v}</text>:null;})}

            {/* ── Hour labels (time axis, once per day) ── */}
            {[0,1,2].map(d=>H_TICKS.map((h,i)=>(
              <text key={`${d}${h}`} x={xOf(d*1440+h*60)} y={SEP_Y+S_H+15} textAnchor="middle" fill={C.sub} fontSize="7.5" fontFamily="DM Mono,monospace">{H_LBLS[i]}</text>
            )))}
          </svg>
        </div>

        {/* ── Swell legend + buoy selector toggle ── */}
        <div className="u" style={{padding:"7px 14px",background:C.card,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <span style={{fontSize:9,color:C.sub,fontWeight:800,letterSpacing:.5}}>SWELL</span>
          {selBuoys.map((id,i)=>{
            const b=BUOYS.find(b=>b.id===id);
            return(<div key={id} style={{display:"flex",alignItems:"center",gap:4,fontSize:9}}>
              <div style={{width:16,height:2.5,background:C.buoy[i],borderRadius:2}}/>
              <span style={{color:C.sub,fontWeight:600}}>{b?.name||id}</span>
            </div>);
          })}
          <button onClick={()=>setShowBuoy(v=>!v)} style={{marginLeft:"auto",padding:"3px 12px",borderRadius:20,border:`1px solid ${C.border}`,background:showBuoy?`${C.tide}18`:C.card,color:showBuoy?C.tide:C.sub,fontSize:9,fontWeight:800}}>
            {showBuoy?"▲ Done":"+ Buoys"}
          </button>
        </div>

        {/* ── Buoy selector panel ── */}
        {showBuoy&&(
          <div className="u" style={{margin:"8px 14px",borderRadius:12,border:`1px solid ${C.border}`,background:C.card,padding:"12px 14px"}}>
            <div style={{fontWeight:900,fontSize:12,marginBottom:2,color:C.txt}}>
              Select buoys <span style={{fontWeight:400,color:C.sub,fontSize:10}}>(tap to add · up to 3)</span>
            </div>
            <div style={{fontSize:9,color:C.sub,marginBottom:10,fontStyle:"italic"}}>Swell lines show demo data. Live NDBC readings are a planned update.</div>
            {bRegions.map(region=>(
              <div key={region}>
                <div style={{fontSize:8,color:C.sub,letterSpacing:1.2,textTransform:"uppercase",margin:"10px 0 5px",fontWeight:700}}>{region}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {BUOYS.filter(b=>b.region===region).map(b=>{
                    const idx=selBuoys.indexOf(b.id);
                    const on=idx>=0,full=!on&&selBuoys.length>=3;
                    return(<button key={b.id} onClick={()=>toggleBuoy(b.id)} style={{padding:"3px 9px",borderRadius:20,border:`1px solid ${on?C.buoy[idx]:C.border}`,background:on?`${C.buoy[idx]}18`:C.card,color:on?C.buoy[idx]:C.sub,fontSize:9,fontWeight:on?800:400,opacity:full?.4:1,cursor:full?"not-allowed":"pointer"}}>
                      {b.id} · {b.name}
                    </button>);
                  })}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ── Moon panel ── */}
        <div className="u" style={{margin:"8px 14px",borderRadius:12,border:`1px solid ${C.border}`,background:C.card}}>
          <button onClick={()=>setShowMoon(v=>!v)} style={{width:"100%",padding:"10px 14px",border:"none",background:"transparent",display:"flex",justifyContent:"space-between",alignItems:"center",fontWeight:800,fontSize:11,color:C.txt}}>
            <span>{mEmoji} Moon · {mName}</span>
            <span style={{color:C.sub,fontWeight:400,fontSize:9}}>{showMoon?"▲":"▼"}</span>
          </button>
          {showMoon&&(
            <div style={{padding:"8px 14px 14px",borderTop:`1px solid ${C.border}`}}>
              <div style={{display:"flex",gap:12,alignItems:"center"}}>
                <div style={{fontSize:44,lineHeight:1}}>{mEmoji}</div>
                <div>
                  <div style={{fontWeight:900,fontSize:15}}>{mName}</div>
                  <div style={{fontSize:10,color:C.sub,marginTop:1}}>Day {Math.round(ph)} of 29.5</div>
                  <div style={{marginTop:6,display:"inline-block",padding:"2px 10px",borderRadius:20,fontSize:9,fontWeight:800,background:isSpring?"#fff8e0":"#f0efff",color:isSpring?C.moonGld:"#9080c0",border:`1px solid ${isSpring?"#e8c050":"#c0b8f0"}`}}>
                    {isSpring?"⚡ Spring tides":"〰 Neap tides"}
                  </div>
                </div>
              </div>
              <div style={{marginTop:8,fontSize:10,color:C.sub,lineHeight:1.6}}>
                {isSpring?"Sun & moon aligned — expect larger tidal swings than average.":"Sun & moon at 90° — reduced tidal range this cycle."}
              </div>
            </div>
          )}
        </div>

        {/* ── Daylight panel ── */}
        <div className="u" style={{margin:"8px 14px",borderRadius:12,border:`1px solid ${C.border}`,background:C.card,padding:"12px 14px"}}>
          <div style={{fontWeight:900,fontSize:11,marginBottom:10}}>☀️ Daylight · {st.name.split(",")[0]}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[{icon:"🌤",lbl:"First Light",v:suns[1].fl},{icon:"🌅",lbl:"Sunrise",v:suns[1].sr},{icon:"🌇",lbl:"Sunset",v:suns[1].ss},{icon:"🌆",lbl:"Last Light",v:suns[1].ll}].map(item=>(
              <div key={item.lbl} style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:18}}>{item.icon}</span>
                <div>
                  <div style={{fontSize:8,color:C.sub}}>{item.lbl}</div>
                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:500}}>{fmtTime(item.v)}</div>
                </div>
              </div>
            ))}
          </div>
        </div>

      </>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<TideTrack/>);
</script>
</body>
</html>
