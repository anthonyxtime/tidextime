// ═══════════════════════════════════════════════════════════════════
// SVG CHART GEOMETRY
//
// Three days are laid side by side: yesterday | today | tomorrow
// "Absolute minutes" (am): 0 = yesterday's local midnight
//                           1440 = today's midnight
//                           2880 = tomorrow's midnight
//
// Vertical layout (top → bottom):
//   [T_TOP gap] tide drawable [T_BOT gap]   ← tide section = T_H px
//   separator line
//   [S_TOP gap] swell drawable [S_BOT gap]  ← swell section = S_H px
//   time-axis strip                         ← AX_H px
//
// xOf(am)  → SVG x coordinate for a given absolute minute
// yT(v)    → SVG y coordinate for a tide height in ft
// yS(v)    → SVG y coordinate for a swell height in ft
// ═══════════════════════════════════════════════════════════════════
const N_DAYS = 3;
const DAY_PX = 420;          // SVG pixels per 24-hour day
const L_PAD  = 38;           // left padding (y-axis labels)
const R_PAD  = 8;
const SVG_W  = L_PAD + N_DAYS * DAY_PX + R_PAD; // 1294

const T_TOP  = 20;           // tide top padding
const T_CH   = 148;          // tide drawable height
const T_BOT  = 6;
const T_H    = T_TOP + T_CH + T_BOT; // 174

const SEP_Y  = T_H;          // y-coordinate of the separator line

const S_TOP  = 8;            // swell top padding
const S_CH   = 80;           // swell drawable height
const S_BOT  = 4;
const S_H    = S_TOP + S_CH + S_BOT; // 92

const AX_H   = 22;           // time axis strip height
const SVG_H  = T_H + S_H + AX_H; // 288

// Coordinate converters
const xOf = am => L_PAD + am * (DAY_PX / 1440);
const yT  = (v, yMin, yMax) =>
  T_TOP + T_CH - ((v - yMin) / (yMax - yMin)) * T_CH;
const yS  = (v, sMax) =>
  SEP_Y + S_TOP + S_CH - (v / Math.max(sMax, 3)) * S_CH;

// Y-axis fixed range: -1 to 7 ft fits SoCal / Hawaii / most of EC.
// An "Expand" button appears automatically if data exceeds this range.
const Y_FIX_MIN   = -1;
const Y_FIX_MAX   = 7;
const Y_FIX_TICKS = [-1, 0, 1, 2, 3, 4, 5, 6, 7];

// Hour tick positions and labels for the time axis

const H_LBLS  = ["12a","3a","6a","9a","12p","3p","6p","9p"];

// ═══════════════════════════════════════════════════════════════════
// MOON PHASE MATH
// Returns a number 0–29.53 = days into current lunar cycle.
// Based on a known new-moon reference date (Jan 6 2000).
// ═══════════════════════════════════════════════════════════════════
function moonPhase(date) {
  const ref   = new Date(2000, 0, 6, 18, 14, 0);
  const cycle = 29.530588853;
  return (((date - ref) / 86400000) % cycle + cycle) % cycle;
}
const MOON_T = [
  [1.85, "🌑","New Moon"],       [5.54, "🌒","Waxing Crescent"],
  [9.22, "🌓","First Quarter"],  [12.91,"🌔","Waxing Gibbous"],
  [16.61,"🌕","Full Moon"],      [20.30,"🌖","Waning Gibbous"],
  [23.99,"🌗","Last Quarter"],   [99,   "🌘","Waning Crescent"],
];
const moonInfo = p => MOON_T.find(([m]) => p < m) || MOON_T[7];

// ═══════════════════════════════════════════════════════════════════
// SUN TIMES
// Returns civil twilight + sunrise/sunset in minutes from midnight
// for a given lat/lon and date. Drives the day/night chart bands.
// ═══════════════════════════════════════════════════════════════════
function sunTimes(lat, lon, date) {
  const toR = d => d * Math.PI / 180;
  // Day of year
  const N = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000);
  const B = toR(360 / 365 * (N - 81));
  // Equation of time (minutes) — corrects for Earth's elliptical orbit
  const EqT  = 9.87 * Math.sin(2*B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
  // Solar declination (Earth's axial tilt)
  const decl = toR(23.45 * Math.sin(toR(360 / 365 * (N - 81))));
  const latR  = toR(lat);
  // Solar noon in local minutes from midnight
  const noon  = 720 - 4 * lon - EqT - date.getTimezoneOffset();
  // Half-day span for a given sun altitude angle
  const hs = alt => {
    const c = (Math.sin(toR(alt)) - Math.sin(latR) * Math.sin(decl))
            / (Math.cos(latR) * Math.cos(decl));
    return (c >= 1 || c <= -1) ? null : Math.acos(c) * (180 / Math.PI) * 4;
  };
  const sr = hs(-0.833); // sunrise/sunset (atmospheric refraction correction)
  const ct = hs(-6);     // civil twilight (-6° below horizon)
  if (!sr) return { fl:0, sr:0, ss:1440, ll:1440 }; // polar edge case
  return {
    fl: Math.round(noon - (ct ?? sr + 30)), // first light
    sr: Math.round(noon - sr),              // sunrise
    ss: Math.round(noon + sr),              // sunset
    ll: Math.round(noon + (ct ?? sr + 30)), // last light
  };
}

// ═══════════════════════════════════════════════════════════════════
// CATMULL-ROM SPLINE INTERPOLATION
// NOAA gives us only 3–4 hi/lo turning points per day.
// This produces a smooth curve through all of them.
// Works on "absolute minutes" (am) spanning the 3-day window.
// ═══════════════════════════════════════════════════════════════════
function interpTide(pts, am) {
  if (!pts?.length) return 0;
  if (am <= pts[0].am)            return pts[0].v;
  if (am >= pts[pts.length-1].am) return pts[pts.length-1].v;
  let i = 0;
  while (i < pts.length-1 && pts[i+1].am < am) i++;
  const p0 = pts[Math.max(0,i-1)],  p1 = pts[i],
        p2 = pts[i+1],              p3 = pts[Math.min(pts.length-1,i+2)];
  const t = (am - p1.am) / (p2.am - p1.am), t2 = t*t, t3 = t2*t;
  return 0.5*(2*p1.v+(-p0.v+p2.v)*t+(2*p0.v-5*p1.v+4*p2.v-p3.v)*t2
             +(-p0.v+3*p1.v-3*p2.v+p3.v)*t3);
}

// Linear interpolation for hourly buoy data (spline overkill for 1-hr data)
function interpBuoy(pts, am) {
  if (!pts?.length) return 0;
  if (am <= pts[0].am)            return pts[0].wh;
  if (am >= pts[pts.length-1].am) return pts[pts.length-1].wh;
  let i = 0;
  while (i < pts.length-1 && pts[i+1].am <= am) i++;
  const p1 = pts[i], p2 = pts[i+1];
  const t  = (am - p1.am) / (p2.am - p1.am);
  return p1.wh + (p2.wh - p1.wh) * t;
}

// ═══════════════════════════════════════════════════════════════════
// DEMO BUOY DATA GENERATOR
// Produces realistic-looking wave height + direction for 3 days.
// Each buoy gets a unique signature from its ID digits (seed).
//
// Swell direction: cardinal degrees (0=N, 90=E, 180=S, 270=W).
// The arrow on the chart is rotated to point IN the direction the
// swell is coming FROM (nautical convention).
//
// Replace genBuoyDemo() with a live NDBC fetch once a proxy is set up.
// ═══════════════════════════════════════════════════════════════════
function genBuoyDemo(id) {
  const seed  = parseInt(id.replace(/\D/g, "")) % 97;
  const baseH = 1.2 + (seed % 22) * 0.07;          // base wave height ft
  const baseD = 220 + (seed % 5) * 18;              // base direction °
  const pts   = [];
  for (let am = 0; am <= N_DAYS * 1440; am += 60) {
    const h = am / 60;
    // Wave height varies realistically over 3 days
    const wh = Math.max(0.2,
      baseH
      + 0.55 * Math.sin(h * 0.16 + seed * 0.09)
      + 0.28 * Math.cos(h * 0.35)
      + 0.12 * Math.sin(h * 0.71 + seed * 0.04)
    );
    // Direction drifts slowly over time, ±20° around base
    const dir = (baseD + 20 * Math.sin(h * 0.08 + seed * 0.1) + 360) % 360;
    pts.push({ am, wh, dir });
  }
  return pts;
}

// ═══════════════════════════════════════════════════════════════════
// DEMO TIDE FALLBACK
// Used if the NOAA fetch fails (network error, CORS in local test).
// Mimics a typical Santa Monica tide pattern over 3 days.
// ═══════════════════════════════════════════════════════════════════
const DEMO_HL = [0,1,2].flatMap(d => [
  {am: d*1440+327,  v: 4.30+d*0.04,  type:"H"},
  {am: d*1440+745,  v: -0.18+d*0.02, type:"L"},
  {am: d*1440+1152, v: 4.38-d*0.03,  type:"H"},
]);

// ═══════════════════════════════════════════════════════════════════
// UNIT & TIME HELPERS
// ═══════════════════════════════════════════════════════════════════
const ftToM   = v => v * 0.3048;
const cvt     = (v, m) => m ? ftToM(v) : v;
const fmtV    = (v, m) => cvt(v, m).toFixed(2);
const fmtVs   = (v, m) => `${cvt(v,m).toFixed(1)} ${m?"m":"ft"}`;
const uLbl    = m => m ? "m" : "ft";

// am = absolute minutes (0 = yesterday midnight).
// Returns a formatted time string for that minute within its day.
function fmtTime(am, short = false) {
  const h  = Math.floor(am % 1440 / 60) % 24;
  const mm = Math.round(am % 60);
  const ap = h >= 12 ? "PM" : "AM";
  const h12 = h % 12 || 12;
  return short
    ? `${h12}:${String(mm).padStart(2,"0")}${ap.toLowerCase()}`
    : `${h12}:${String(mm).padStart(2,"0")} ${ap}`;
}

// Format a compass direction (degrees) to a cardinal abbreviation
function dirLabel(deg) {
  const dirs = ["N","NNE","NE","ENE","E","ESE","SE","SSE",
                "S","SSW","SW","WSW","W","WNW","NW","NNW"];
  return dirs[Math.round(((deg % 360) + 360) % 360 / 22.5) % 16];
}

const nowLocalStr = () =>
  new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:true});
const nowUTCStr = () => {
  const d = new Date();
  return `${String(d.getUTCHours()).padStart(2,"0")}:${String(d.getUTCMinutes()).padStart(2,"0")} UTC`;
};

// Format a Date → YYYYMMDD string for the NOAA API
const dateFmt = d =>
  `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;

// Format a Date → YYYY-MM-DD to compare against NOAA response strings
const dateKey = d => d.toISOString().slice(0,10).replace(/-/g,"");

// ═══════════════════════════════════════════════════════════════════
// SWELL DIRECTION ARROW GLYPH
// Draws a small arrow at (cx,cy) rotated to the compass direction.
// Swell direction is "coming FROM" — so 270° (W swell) points East.
// Arrow tip points in the direction of wave travel (opposite of FROM).
// ═══════════════════════════════════════════════════════════════════
function SwellArrow({ cx, cy, dir, color }) {
  // Rotate so the arrow tip points in direction of wave travel
  const travelDeg = (dir + 180) % 360;
  // SVG path: small upward arrow (tip at top, centered at origin)
  // We'll rotate it to the travel direction
  const s = 5; // arrow half-size in SVG units
  return (
    <g transform={`translate(${cx},${cy}) rotate(${travelDeg})`}>
      {/* Arrow body */}
      <line x1="0" y1="3" x2="0" y2={-s+1}
        stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
      {/* Arrowhead — two lines forming a V */}
      <line x1={-s*0.4} y1={-s+3} x2="0" y2={-s}
        stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
      <line x1={ s*0.4} y1={-s+3} x2="0" y2={-s}
        stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
    </g>
  );
}

// ═══════════════════════════════════════════════════════════════════
// MAIN APP COMPONENT
// ═══════════════════════════════════════════════════════════════════
function TideTrack() {

  // ── Reference dates ─────────────────────────────────────────────
  const today = new Date();
  const yest  = new Date(today); yest.setDate(today.getDate()-1);
  const tmrw  = new Date(today); tmrw.setDate(today.getDate()+1);
  // nowAM = current time as absolute minutes (yesterday=0, today=1440)
  const nowAM = 1440 + today.getHours()*60 + today.getMinutes();

  // ── App state ────────────────────────────────────────────────────
  const [stIdx,    setStIdx]    = useState(0);
  const [hlPts,    setHlPts]    = useState(null);   // NOAA hi/lo tide points
  const [loading,  setLoading]  = useState(true);
  const [isDemo,   setIsDemo]   = useState(false);
  const [cursor,   setCursor]   = useState(nowAM);  // absolute minute for reading
  const [metric,   setMetric]   = useState(false);  // ft vs m
  const [expanded, setExpanded] = useState(false);  // y-axis expand
  const [selBuoys, setSelBuoys] = useState(["46221","46025"]); // active buoy IDs
  const [showPick, setShowPick] = useState(false);  // station picker open
  const [showBuoy, setShowBuoy] = useState(false);  // buoy selector open
  const [showMoon, setShowMoon] = useState(true);   // moon panel expanded
  const [, tick]               = useState(0);       // clock re-render trigger

  const scrollEl  = useRef(null); // reference to the scrollable container
  const rafId     = useRef(null); // requestAnimationFrame ID for smooth trace

  // ── Derived values ───────────────────────────────────────────────
  const st    = STATIONS[stIdx];
  // Sun times for each of the 3 days (yesterday, today, tomorrow)
  const suns  = [yest, today, tmrw].map(d => sunTimes(st.lat, st.lon, d));
  const ph    = moonPhase(today);
  const [, mEmoji, mName] = moonInfo(ph);
  const isSpring = ph < 3 || ph > 27 || (ph > 13 && ph < 17);

  // ── Clock: re-render every 30 s to keep time display current ────
  useEffect(() => {
    const id = setInterval(() => tick(n => n+1), 30000);
    return () => clearInterval(id);
  }, []);

  // ── Fetch 3-day NOAA tide hi/lo predictions ──────────────────────
  // Runs when the selected station changes.
  // API: NOAA CO-OPS datagetter — free, no key needed.
  useEffect(() => {
    setLoading(true); setHlPts(null); setExpanded(false);
    const yKey = dateKey(yest), tKey = dateKey(today), mKey = dateKey(tmrw);
    const url =
      `https://api.tidesandcurrents.noaa.gov/api/prod/datagetter`+
      `?begin_date=${dateFmt(yest)}&end_date=${dateFmt(tmrw)}`+
      `&station=${st.id}&product=predictions&datum=MLLW`+
      `&time_zone=lst_ldt&interval=hilo&units=english`+
      `&application=tidetrack&format=json`;
    fetch(url)
      .then(r => r.json())
      .then(data => {
        if (data.predictions) {
          // Convert each NOAA prediction into an absolute-minute point
          const pts = data.predictions.map(p => {
            const dk = p.t.slice(0,10).replace(/-/g,"");
            const di = dk===yKey ? 0 : dk===tKey ? 1 : 2; // day index
            const [hh,mm] = p.t.slice(11,16).split(":").map(Number);
            return { am: di*1440 + hh*60+mm, v: parseFloat(p.v), type: p.type };
          }).sort((a,b) => a.am - b.am);
          setHlPts(pts); setIsDemo(false);
        } else {
          setHlPts(DEMO_HL); setIsDemo(true);
        }
        setLoading(false);
      })
      .catch(() => { setHlPts(DEMO_HL); setIsDemo(true); setLoading(false); });
  }, [stIdx]);

  // ── Auto-scroll to center "now" on first load ────────────────────
  useEffect(() => {
    if (!loading && scrollEl.current) {
      const nowX = xOf(nowAM);
      scrollEl.current.scrollLeft = nowX - scrollEl.current.clientWidth / 2;
    }
  }, [loading]);

  // ── Y-axis scaling ───────────────────────────────────────────────
  // Default: fixed -1 to 7 ft. If actual data exceeds that range
  // (e.g. Seattle), show the EXPAND button.
  const dMin = hlPts ? Math.min(...hlPts.map(h=>h.v)) : 0;
  const dMax = hlPts ? Math.max(...hlPts.map(h=>h.v)) : 5;
  const needsExp = dMin < Y_FIX_MIN+0.1 || dMax > Y_FIX_MAX-0.1;
  const yMin = expanded ? dMin-0.8 : Y_FIX_MIN;
  const yMax = expanded ? dMax+0.8 : Y_FIX_MAX;
  const yRange = yMax - yMin;
  let yTicks;
  if (!expanded) {
    yTicks = Y_FIX_TICKS;
  } else {
    const s = yRange>16 ? 4 : yRange>8 ? 2 : 1;
    yTicks = [];
    for (let v = Math.ceil(yMin/s)*s; v <= yMax; v += s) yTicks.push(v);
  }
  const yTV = v => yT(v, yMin, yMax); // shorthand with current scale

  // ── Smooth tide curve ────────────────────────────────────────────
  // Sample every 10 minutes → 433 points across 3 days
  const tCurve = hlPts
    ? Array.from({length:433}, (_,i) => ({am:i*10, v:interpTide(hlPts,i*10)}))
    : [];
  const tPath = tCurve.length
    ? "M "+tCurve.map(p=>`${xOf(p.am).toFixed(1)},${yTV(p.v).toFixed(1)}`).join(" L ")
    : "";
  const tArea = tPath
    ? `${tPath} L ${xOf(N_DAYS*1440)},${yTV(yMin)} L ${xOf(0)},${yTV(yMin)} Z`
    : "";

  // ── Buoy data ────────────────────────────────────────────────────
  const buoyData = selBuoys.map(id => ({ id, pts: genBuoyDemo(id) }));
  const swMax    = Math.max(4, ...buoyData.flatMap(b => b.pts.map(p => p.wh)));
  const ySV      = v => yS(v, swMax);

  // ── Cursor values ────────────────────────────────────────────────
  const selTide   = hlPts ? interpTide(hlPts, cursor) : 0;
  const curDay    = Math.floor(cursor / 1440);
  const curDayLbl = curDay===0 ? "Yesterday" : curDay===1 ? "Today" : "Tomorrow";
  const nextHL    = hlPts?.find(p => p.am > nowAM);
  const nowX      = xOf(nowAM);
  const curX      = xOf(cursor);

  // ── SMOOTH TRACING ON DESKTOP (mousemove) ────────────────────────
  // We attach onMouseMove to the scroll container.
  // On desktop, moving the mouse over the chart continuously updates
  // the cursor reading without interfering with anything.
  // On mobile, touch events are consumed by the scroll container for
  // swiping — the user taps a single point to set the reading instead.
  // This clean split means: DRAG = scroll, TAP = read, HOVER = trace.
  const onMouseMove = useCallback(e => {
    if (!scrollEl.current) return;
    const rect  = scrollEl.current.getBoundingClientRect();
    const svgX  = e.clientX - rect.left + scrollEl.current.scrollLeft;
    const am    = (svgX - L_PAD) * (1440 / DAY_PX);
    const amClamp = Math.max(0, Math.min(N_DAYS*1440-1, Math.round(am)));
    // Use RAF to throttle to 60fps — prevents jank on rapid mouse moves
    if (rafId.current) cancelAnimationFrame(rafId.current);
    rafId.current = requestAnimationFrame(() => {
      setCursor(amClamp);
      rafId.current = null;
    });
  }, []);

  // ── TAP TO READ ON MOBILE (onClick) ─────────────────────────────
  // A tap fires onClick. A swipe (scroll) does NOT fire onClick.
  // So this automatically works alongside scroll with zero conflict.
  const onChartClick = useCallback(e => {
    if (!scrollEl.current) return;
    const rect  = scrollEl.current.getBoundingClientRect();
    const svgX  = e.clientX - rect.left + scrollEl.current.scrollLeft;
    const am    = (svgX - L_PAD) * (1440 / DAY_PX);
    setCursor(Math.max(0, Math.min(N_DAYS*1440-1, Math.round(am))));
  }, []);

  // ── Buoy toggle (max 3 at once) ───────────────────────────────────
  const toggleBuoy = id => setSelBuoys(prev =>
    prev.includes(id)
      ? prev.filter(b => b !== id)
      : prev.length < 3 ? [...prev, id] : prev
  );

  const stRegions = [...new Set(STATIONS.map(s => s.region))];
  const bRegions  = [...new Set(BUOYS.map(b => b.region))];

  // ── Swell value at cursor position (for readout) ──────────────────
  const cursorBuoyReadings = buoyData.map(bd => ({
    id:  bd.id,
    wh:  interpBuoy(bd.pts, cursor),
    dir: (() => {
      // Interpolate direction (handle wrap-around at 360°)
      const pts = bd.pts;
      if (!pts.length) return 0;
      if (cursor <= pts[0].am) return pts[0].dir;
      if (cursor >= pts[pts.length-1].am) return pts[pts.length-1].dir;
      let i = 0;
      while (i < pts.length-1 && pts[i+1].am <= cursor) i++;
      return pts[i].dir; // use nearest (direction wrap makes interpolation tricky)
    })(),
  }));

  // ═══════════════════════════════════════════════════════════════════
  // RENDER
  // ═══════════════════════════════════════════════════════════════════
  return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:"'Nunito',sans-serif",
                 maxWidth:480,margin:"0 auto",paddingBottom:80,color:C.txt}}>
      <style>{`
        *{box-sizing:border-box}
        ::-webkit-scrollbar{height:3px;width:3px;background:transparent}
        ::-webkit-scrollbar-thumb{background:${C.border};border-radius:2px}
        @keyframes up{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
        .u{animation:up .25s ease both}
        button{font-family:'Nunito',sans-serif;cursor:pointer;transition:all .12s}
        button:active{transform:scale(.97)}
      `}</style>

      {/* ══ HEADER ════════════════════════════════════════════════ */}
      <div style={{padding:"16px 16px 12px",background:C.card,borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:20,fontWeight:900,letterSpacing:-0.5,lineHeight:1}}>
              🌊 TideTrack
            </div>
            <div style={{fontSize:10,color:C.sub,marginTop:2}}>
              {today.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}
            </div>
          </div>
          {/* Dual clock: local time large, UTC small below */}
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:14,fontWeight:800}}>{nowLocalStr()}</div>
            <div style={{fontSize:9,color:C.sub,fontFamily:"'DM Mono',monospace"}}>{nowUTCStr()}</div>
          </div>
        </div>

        {/* Station picker button */}
        <div style={{marginTop:10,position:"relative"}}>
          <button onClick={()=>setShowPick(v=>!v)} style={{
            width:"100%",padding:"7px 12px",borderRadius:10,
            border:`1px solid ${C.border}`,background:"transparent",
            color:C.txt,fontSize:11,display:"flex",justifyContent:"space-between",
            alignItems:"center",fontWeight:700}}>
            <span>📍 {st.name}</span>
            <span style={{color:C.sub,fontWeight:400,fontSize:9}}>{showPick?"▲ close":"▼ change"}</span>
          </button>

          {/* Dropdown list — grouped by region */}
          {showPick && (
            <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:99,
                         background:C.card,border:`1px solid ${C.border}`,borderRadius:10,
                         maxHeight:230,overflowY:"auto",boxShadow:"0 6px 24px rgba(0,0,0,.1)"}}>
              {stRegions.map(region => (
                <div key={region}>
                  <div style={{padding:"5px 12px 2px",fontSize:8,color:C.sub,
                               letterSpacing:1.2,textTransform:"uppercase",
                               borderTop:`1px solid ${C.border}`}}>{region}</div>
                  {STATIONS.map((s,i) => s.region!==region ? null : (
                    <button key={s.id} onClick={()=>{setStIdx(i);setShowPick(false);}}
                      style={{width:"100%",padding:"6px 12px 6px 16px",border:"none",
                              textAlign:"left",fontSize:11,
                              background:i===stIdx?`${C.tide}20`:"transparent",
                              color:i===stIdx?C.tide:C.txt,fontWeight:i===stIdx?800:400,
                              borderLeft:`2px solid ${i===stIdx?C.tide:"transparent"}`}}>
                      {s.name}
                    </button>
                  ))}
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Demo data notice */}
        {isDemo && (
          <div style={{marginTop:6,display:"inline-block",padding:"2px 10px",
                       borderRadius:20,fontSize:9,background:"#fdf5d8",
                       border:"1px solid #d4aa40",color:"#886820",fontWeight:700}}>
            ⚠ Demo tide data — live NOAA data loads on GitHub Pages
          </div>
        )}
      </div>

      {loading ? (
        <div style={{padding:50,textAlign:"center",color:C.sub,fontSize:13,fontWeight:700}}>
          Loading tide data…
        </div>
      ) : (<>

        {/* ══ TIDE READING (big number) ══════════════════════════ */}
        <div className="u" style={{padding:"12px 16px 10px",background:C.card,
                                   borderBottom:`1px solid ${C.border}`}}>
          <div style={{display:"flex",alignItems:"flex-end",gap:6,flexWrap:"wrap"}}>
            <div>
              {/* Label showing which day + time the cursor is on */}
              <div style={{fontSize:9,color:C.sub,letterSpacing:.5,
                           textTransform:"uppercase",marginBottom:2}}>
                Tide · {curDayLbl} · {fmtTime(cursor)}
              </div>
              {/* Large tide value */}
              <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:44,
                              fontWeight:500,lineHeight:1,
                              color:selTide>0?C.tide:"#b04040"}}>
                  {fmtV(selTide,metric)}
                </span>
                <span style={{fontSize:14,color:C.sub,fontWeight:700,marginBottom:3}}>
                  {uLbl(metric)}
                </span>
                <span style={{fontSize:9,color:C.light,marginBottom:4,marginLeft:2}}>
                  MLLW
                </span>
              </div>
            </div>

            {/* Action buttons */}
            <div style={{marginLeft:"auto",display:"flex",gap:6,
                         alignSelf:"center",paddingBottom:2}}>
              {/* Jump cursor back to right now */}
              <button onClick={()=>setCursor(nowAM)} style={{
                padding:"4px 12px",borderRadius:20,
                border:`1.5px solid ${cursor===nowAM?C.tide:C.border}`,
                background:cursor===nowAM?`${C.tide}20`:C.card,
                color:cursor===nowAM?C.tide:C.sub,fontSize:10,fontWeight:800}}>
                Now
              </button>
              {/* Toggle ft / m */}
              <button onClick={()=>setMetric(v=>!v)} style={{
                padding:"4px 12px",borderRadius:20,border:`1px solid ${C.border}`,
                background:C.card,color:C.sub,fontSize:10,fontWeight:700}}>
                {metric?"→ ft":"→ m"}
              </button>
              {/* Expand y-axis (only appears when needed) */}
              {needsExp && (
                <button onClick={()=>setExpanded(v=>!v)} style={{
                  padding:"4px 10px",borderRadius:20,border:`1px solid ${C.border}`,
                  background:C.card,color:C.sub,fontSize:9,fontWeight:600}}>
                  {expanded?"↕ Fix":"↕ Exp"}
                </button>
              )}
            </div>
          </div>

          {/* Next hi/lo countdown */}
          {nextHL && (
            <div style={{fontSize:10,color:C.sub,marginTop:3}}>
              {nextHL.type==="H"?"▲ Next high":"▼ Next low"}: {fmtVs(nextHL.v,metric)}{" "}
              at {fmtTime(nextHL.am)} · {Math.floor((nextHL.am-nowAM)/60)}h{" "}
              {(nextHL.am-nowAM)%60}m away
            </div>
          )}

          {/* Swell readings at cursor position */}
          {cursorBuoyReadings.length > 0 && (
            <div style={{marginTop:6,display:"flex",gap:10,flexWrap:"wrap"}}>
              {cursorBuoyReadings.map((r,i) => {
                const b = BUOYS.find(b=>b.id===r.id);
                return (
                  <div key={r.id} style={{display:"flex",alignItems:"center",
                                          gap:5,fontSize:10}}>
                    <div style={{width:10,height:10,borderRadius:"50%",
                                 background:C.buoy[i],flexShrink:0}}/>
                    <span style={{color:C.sub,fontWeight:700}}>
                      {b?.name?.split(" ")[0]||r.id}:
                    </span>
                    <span style={{color:C.txt,fontFamily:"'DM Mono',monospace"}}>
                      {fmtVs(r.wh,metric)}
                    </span>
                    <span style={{color:C.light,fontSize:9}}>
                      {dirLabel(r.dir)}
                    </span>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* ══ SCROLLABLE CHART ══════════════════════════════════ */}
        {/* 
            INTERACTION MODEL:
            - Desktop: move mouse over chart → cursor traces smoothly (onMouseMove)
            - Mobile:  tap on chart → sets cursor (onClick, doesn't fire on swipe)
            - Mobile:  swipe left/right → scrolls to adjacent days (native scroll)
            These three gestures never conflict with each other.
        */}
        <div
          ref={scrollEl}
          onMouseMove={onMouseMove}   // desktop: smooth hover tracing
          onClick={onChartClick}       // mobile: tap to read
          style={{overflowX:"auto",overflowY:"hidden",
                  WebkitOverflowScrolling:"touch",
                  background:C.bg,cursor:"crosshair"}}>

          <svg width={SVG_W} height={SVG_H} style={{display:"block"}}>
            <defs>
              {/* Gradient fill under the tide curve */}
              <linearGradient id="tG" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stopColor={C.tideA0}/>
                <stop offset="100%" stopColor={C.tideA1}/>
              </linearGradient>
              {/* Dawn/dusk horizontal gradients — one set per day */}
              {[0,1,2].map(d => {
                const s = suns[d];
                return (
                  <React.Fragment key={d}>
                    <linearGradient id={`dn${d}`} gradientUnits="userSpaceOnUse"
                      x1={xOf(d*1440+s.fl)} y1="0" x2={xOf(d*1440+s.sr)} y2="0">
                      <stop offset="0%"   stopColor={C.night}/>
                      <stop offset="100%" stopColor={C.dawn}/>
                    </linearGradient>
                    <linearGradient id={`dk${d}`} gradientUnits="userSpaceOnUse"
                      x1={xOf(d*1440+s.ss)} y1="0" x2={xOf(d*1440+s.ll)} y2="0">
                      <stop offset="0%"   stopColor={C.dawn}/>
                      <stop offset="100%" stopColor={C.night}/>
                    </linearGradient>
                  </React.Fragment>
                );
              })}
            </defs>

            {/* ── Day/night background bands (tide section) ── */}
            {/* Start with full night, then paint over with dawn/day/dusk */}
            <rect x={L_PAD} y={T_TOP} width={N_DAYS*DAY_PX} height={T_CH+T_BOT} fill={C.night}/>
            {[0,1,2].map(d => {
              const s = suns[d];
              return (
                <React.Fragment key={d}>
                  {/* Daylight band */}
                  {s.sr<s.ss && (
                    <rect x={xOf(d*1440+s.sr)} y={T_TOP}
                      width={xOf(d*1440+s.ss)-xOf(d*1440+s.sr)}
                      height={T_CH+T_BOT} fill={C.day}/>
                  )}
                  {/* Dawn transition */}
                  {s.fl<s.sr && (
                    <rect x={xOf(d*1440+s.fl)} y={T_TOP}
                      width={xOf(d*1440+s.sr)-xOf(d*1440+s.fl)}
                      height={T_CH+T_BOT} fill={`url(#dn${d})`}/>
                  )}
                  {/* Dusk transition */}
                  {s.ss<s.ll && (
                    <rect x={xOf(d*1440+s.ss)} y={T_TOP}
                      width={xOf(d*1440+s.ll)-xOf(d*1440+s.ss)}
                      height={T_CH+T_BOT} fill={`url(#dk${d})`}/>
                  )}
                </React.Fragment>
              );
            })}

            {/* ── Swell section background ── */}
            <rect x={L_PAD} y={SEP_Y} width={N_DAYS*DAY_PX} height={S_H} fill={C.card}/>
            {/* Subtle daylight tint in swell section too */}
            {[0,1,2].map(d => {
              const s = suns[d];
              return s.sr < s.ss ? (
                <rect key={d} x={xOf(d*1440+s.sr)} y={SEP_Y}
                  width={xOf(d*1440+s.ss)-xOf(d*1440+s.sr)}
                  height={S_H} fill="#eff5fa"/>
              ) : null;
            })}

            {/* ── Time axis strip background ── */}
            <rect x={0} y={SEP_Y+S_H} width={SVG_W} height={AX_H} fill={C.card}/>

            {/* ── Section separator lines ── */}
            <line x1={L_PAD} y1={SEP_Y}     x2={SVG_W} y2={SEP_Y}
              stroke={C.border} strokeWidth="1"/>
            <line x1={L_PAD} y1={SEP_Y+S_H} x2={SVG_W} y2={SEP_Y+S_H}
              stroke={C.border} strokeWidth="0.5"/>

            {/* ── Day boundary lines ── */}
            {[1,2].map(d => (
              <line key={d} x1={xOf(d*1440)} y1={T_TOP} x2={xOf(d*1440)} y2={SEP_Y+S_H}
                stroke={C.border} strokeWidth="1" strokeDasharray="4,3"/>
            ))}

            {/* ── Day header labels ── */}
            {[["YESTERDAY",0],["TODAY",1],["TOMORROW",2]].map(([lbl,d]) => (
              <text key={lbl} x={xOf(d*1440+720)} y={T_TOP-7}
                textAnchor="middle"
                fill={d===1 ? C.tide : C.light}
                fontSize="8" fontWeight="700" letterSpacing="0.8"
                fontFamily="Nunito,sans-serif">
                {lbl}
              </text>
            ))}

            {/* ── Subtle today highlight tint ── */}
            <rect x={xOf(1440)} y={T_TOP} width={DAY_PX} height={T_CH}
              fill="rgba(77,150,160,0.04)" pointerEvents="none"/>

            {/* ── Tide horizontal grid lines ── */}
            {yTicks.map(v => (
              <line key={v} x1={L_PAD} y1={yTV(v)} x2={SVG_W-R_PAD} y2={yTV(v)}
                stroke={v===0 ? C.zero : C.border}
                strokeWidth="0.8" strokeDasharray={v===0?"4,3":"none"}/>
            ))}

            {/* ── Swell horizontal grid lines ── */}
            {[1,2,3,4].map(v => {
              const yv = ySV(v);
              return (yv > SEP_Y+4 && yv < SEP_Y+S_H-4) ? (
                <line key={v} x1={L_PAD} y1={yv} x2={SVG_W-R_PAD} y2={yv}
                  stroke={C.border} strokeWidth="0.7"/>
              ) : null;
            })}

            {/* ── Tide area fill (under the curve) ── */}
            {tArea && <path d={tArea} fill="url(#tG)"/>}

            {/* ── Tide curve line ── */}
            {tPath && (
              <path d={tPath} fill="none" stroke={C.tide}
                strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
            )}

            {/* ── Hi/Lo turning point markers ── */}
            {hlPts?.map((p, i) => {
              if (p.v < yMin || p.v > yMax) return null;
              const cx = xOf(p.am), cy = yTV(p.v), hi = p.type==="H";
              // Flip label position if dot is near chart edge to avoid clipping
              const nearTop = cy < T_TOP+22, nearBot = cy > T_TOP+T_CH-22;
              const flip = hi ? nearTop : nearBot;
              const vY = flip ? (hi?cy+14:cy-6)  : (hi?cy-6:cy+14);
              const tY = flip ? (hi?cy+24:cy-16) : (hi?cy-16:cy+24);
              return (
                <g key={i}>
                  {/* Dot: filled for high tide, hollow for low tide */}
                  <circle cx={cx} cy={cy} r="3.5"
                    fill={hi?C.tide:C.card} stroke={C.tide} strokeWidth="1.5"/>
                  {/* Height label */}
                  <text x={cx} y={vY} textAnchor="middle"
                    fill={C.tide} fontSize="9" fontWeight="800"
                    fontFamily="Nunito,sans-serif">
                    {fmtVs(p.v,metric)}
                  </text>
                  {/* Time label */}
                  <text x={cx} y={tY} textAnchor="middle"
                    fill={C.sub} fontSize="8" fontFamily="DM Mono,monospace">
                    {fmtTime(p.am,true)}
                  </text>
                </g>
              );
            })}

            {/* ══ BUOY SWELL LINES + DIRECTIONAL ARROWS ══════════ */}
            {/*
                Rendering two segments per buoy:
                1. Solid line from start → now (past/observed data)
                2. Dashed faded line from now → end (how it might continue)
                Directional arrows drawn every 3 hours along the solid segment.
                Arrow points in the direction waves are TRAVELING (opposite of "from").
            */}
            {buoyData.map((bd, bi) => {
              const col      = C.buoy[bi];
              const pastPts  = bd.pts.filter(p => p.am <= nowAM);
              const futurePts= bd.pts.filter(p => p.am >= nowAM);
              const bridgeWH = interpBuoy(bd.pts, nowAM);
              const bridgeDir= bd.pts.find(p=>p.am>=nowAM)?.dir ?? 270;

              // Build SVG path strings
              const pp = pastPts.length
                ? "M "+pastPts.map(p=>`${xOf(p.am).toFixed(1)},${ySV(p.wh).toFixed(1)}`).join(" L ")
                : "";
              const fp = futurePts.length
                ? "M "+[{am:nowAM,wh:bridgeWH},...futurePts]
                    .map(p=>`${xOf(p.am).toFixed(1)},${ySV(p.wh).toFixed(1)}`).join(" L ")
                : "";

              // Direction arrow positions: every 3 hours in the past segment
              const arrowPts = bd.pts.filter(p =>
                p.am <= nowAM && (p.am % 180 === 0) // every 3 hours (180 min)
              );

              return (
                <React.Fragment key={bd.id}>
                  {/* Past: solid line */}
                  {pp && <path d={pp} fill="none" stroke={col}
                    strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>}
                  {/* Future: dashed + faded */}
                  {fp && <path d={fp} fill="none" stroke={col}
                    strokeWidth="1.5" strokeDasharray="5,4" opacity="0.38"/>}
                  {/* Dot at the "now" junction on the buoy line */}
                  <circle cx={xOf(nowAM)} cy={ySV(bridgeWH)} r="3" fill={col}/>
                  {/* Directional arrows along past segment */}
                  {arrowPts.map((p,ai) => (
                    <SwellArrow key={ai}
                      cx={xOf(p.am)} cy={ySV(p.wh)}
                      dir={p.dir} color={col}/>
                  ))}
                </React.Fragment>
              );
            })}

            {/* ── NOW vertical marker ── */}
            <line x1={nowX} y1={T_TOP-2} x2={nowX} y2={SEP_Y+S_H}
              stroke={C.now} strokeWidth="1.5" opacity="0.6"/>
            <text x={nowX} y={T_TOP-8} textAnchor="middle"
              fill={C.now} fontSize="7" fontWeight="800"
              fontFamily="Nunito,sans-serif">NOW</text>

            {/* ── Cursor line ── */}
            <line x1={curX} y1={T_TOP} x2={curX} y2={SEP_Y+S_H}
              stroke="rgba(80,60,40,.18)" strokeWidth="1" strokeDasharray="3,2"/>

            {/* ── Cursor dot on tide curve ── */}
            {(()=>{
              const rawCY = yTV(selTide);
              const cy    = Math.max(T_TOP+4, Math.min(T_TOP+T_CH-4, rawCY));
              return (
                <circle cx={curX} cy={cy} r="4.5"
                  fill={C.card} stroke={C.tide} strokeWidth="2"/>
              );
            })()}

            {/* ── Y-axis labels: tide ── */}
            {yTicks.map(v => (
              <text key={v} x={L_PAD-5} y={yTV(v)+3}
                textAnchor="end" fill={C.sub} fontSize="8"
                fontFamily="DM Mono,monospace">{v}</text>
            ))}
            <text x={L_PAD-5} y={T_TOP-8} textAnchor="end"
              fill={C.light} fontSize="7">{uLbl(metric)}</text>

            {/* ── Y-axis labels: swell ── */}
            <text x={L_PAD-5} y={SEP_Y+S_TOP+7}
              textAnchor="end" fill={C.light} fontSize="7">ft</text>
            {[1,2,3,4].map(v => {
              const yv = ySV(v);
              return (yv > SEP_Y+8 && yv < SEP_Y+S_H-4) ? (
                <text key={v} x={L_PAD-5} y={yv+3}
                  textAnchor="end" fill={C.sub} fontSize="7"
                  fontFamily="DM Mono,monospace">{v}</text>
              ) : null;
            })}

            {/* ── Time axis hour labels (repeated once per day) ── */}
            {[0,1,2].map(d => H_TICKS.map((h,i) => (
              <text key={`${d}${h}`}
                x={xOf(d*1440+h*60)} y={SEP_Y+S_H+15}
                textAnchor="middle" fill={C.sub} fontSize="7.5"
                fontFamily="DM Mono,monospace">
                {H_LBLS[i]}
              </text>
            )))}

          </svg>
        </div>

        {/* ── Interaction hint ── */}
        <div style={{padding:"4px 14px",background:C.cardB,
                     borderBottom:`1px solid ${C.border}`,
                     display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:8,color:C.light}}>
            🖱 hover to trace · tap to pin · swipe to scroll
          </span>
          <span style={{fontSize:8,color:C.light}}>
            ← Yesterday · Tomorrow →
          </span>
        </div>

        {/* ── Swell legend + Buoy selector toggle ── */}
        <div className="u" style={{padding:"7px 14px",background:C.card,
                                   borderBottom:`1px solid ${C.border}`,
                                   display:"flex",alignItems:"center",
                                   gap:10,flexWrap:"wrap"}}>
          <span style={{fontSize:9,color:C.sub,fontWeight:800,letterSpacing:.5}}>
            SWELL
          </span>
          {/* Legend dots for each active buoy */}
          {selBuoys.map((id,i) => {
            const b = BUOYS.find(b=>b.id===id);
            return (
              <div key={id} style={{display:"flex",alignItems:"center",gap:5,fontSize:9}}>
                <div style={{width:18,height:2.5,background:C.buoy[i],borderRadius:2}}/>
                <span style={{color:C.sub,fontWeight:600}}>{b?.name||id}</span>
              </div>
            );
          })}
          <button onClick={()=>setShowBuoy(v=>!v)} style={{
            marginLeft:"auto",padding:"3px 12px",borderRadius:20,
            border:`1px solid ${showBuoy?C.tide:C.border}`,
            background:showBuoy?`${C.tide}20`:C.card,
            color:showBuoy?C.tide:C.sub,fontSize:9,fontWeight:800}}>
            {showBuoy?"▲ Done":"+ Buoys"}
          </button>
        </div>

        {/* ── Buoy selector panel ── */}
        {showBuoy && (
          <div className="u" style={{margin:"8px 14px",borderRadius:12,
                                     border:`1px solid ${C.border}`,
                                     background:C.card,padding:"12px 14px"}}>
            <div style={{fontWeight:900,fontSize:12,marginBottom:2,color:C.txt}}>
              Select buoys{" "}
              <span style={{fontWeight:400,color:C.sub,fontSize:10}}>
                (tap to toggle · max 3)
              </span>
            </div>
            <div style={{fontSize:9,color:C.sub,marginBottom:10,fontStyle:"italic"}}>
              Showing realistic demo data. Live NDBC swell readings are a planned update.
            </div>
            {bRegions.map(region => (
              <div key={region}>
                <div style={{fontSize:8,color:C.sub,letterSpacing:1.2,
                             textTransform:"uppercase",margin:"10px 0 5px",fontWeight:700}}>
                  {region}
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {BUOYS.filter(b=>b.region===region).map(b => {
                    const idx = selBuoys.indexOf(b.id);
                    const on  = idx >= 0;
                    const full= !on && selBuoys.length >= 3;
                    return (
                      <button key={b.id} onClick={()=>toggleBuoy(b.id)} style={{
                        padding:"3px 9px",borderRadius:20,
                        border:`1px solid ${on?C.buoy[idx]:C.border}`,
                        background:on?`${C.buoy[idx]}18`:C.card,
                        color:on?C.buoy[idx]:C.sub,
                        fontSize:9,fontWeight:on?800:400,
                        opacity:full?.4:1,cursor:full?"not-allowed":"pointer"}}>
                        {b.id} · {b.name}
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ── Moon panel (collapsible) ── */}
        <div className="u" style={{margin:"8px 14px",borderRadius:12,
                                   border:`1px solid ${C.border}`,background:C.card}}>
          <button onClick={()=>setShowMoon(v=>!v)} style={{
            width:"100%",padding:"10px 14px",border:"none",background:"transparent",
            display:"flex",justifyContent:"space-between",alignItems:"center",
            fontWeight:800,fontSize:11,color:C.txt}}>
            <span>{mEmoji} Moon · {mName}</span>
            <span style={{color:C.sub,fontWeight:400,fontSize:9}}>{showMoon?"▲":"▼"}</span>
          </button>
          {showMoon && (
            <div style={{padding:"8px 14px 14px",borderTop:`1px solid ${C.border}`}}>
              <div style={{display:"flex",gap:12,alignItems:"center"}}>
                <div style={{fontSize:44,lineHeight:1}}>{mEmoji}</div>
                <div>
                  <div style={{fontWeight:900,fontSize:15}}>{mName}</div>
                  <div style={{fontSize:10,color:C.sub,marginTop:1}}>
                    Day {Math.round(ph)} of 29.5-day cycle
                  </div>
                  <div style={{marginTop:6,display:"inline-block",padding:"2px 10px",
                               borderRadius:20,fontSize:9,fontWeight:800,
                               background:isSpring?"#fdf5d8":"#eeedfa",
                               color:isSpring?C.moonGld:"#7060a8",
                               border:`1px solid ${isSpring?"#d4aa40":"#b0a8e0"}`}}>
                    {isSpring?"⚡ Spring tides — larger range":"〰 Neap tides — smaller range"}
                  </div>
                </div>
              </div>
              <div style={{marginTop:8,fontSize:10,color:C.sub,lineHeight:1.6}}>
                {isSpring
                  ?"Sun & moon aligned — expect higher highs and lower lows than average."
                  :"Sun & moon at 90° — tidal forces partially cancel out this week."}
              </div>
            </div>
          )}
        </div>

        {/* ── Daylight panel ── */}
        <div className="u" style={{margin:"8px 14px",borderRadius:12,
                                   border:`1px solid ${C.border}`,
                                   background:C.card,padding:"12px 14px"}}>
          <div style={{fontWeight:900,fontSize:11,marginBottom:10}}>
            ☀️ Daylight · {st.name.split(",")[0]}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[
              {icon:"🌤",lbl:"First Light",v:suns[1].fl},
              {icon:"🌅",lbl:"Sunrise",    v:suns[1].sr},
              {icon:"🌇",lbl:"Sunset",     v:suns[1].ss},
              {icon:"🌆",lbl:"Last Light", v:suns[1].ll},
            ].map(item => (
              <div key={item.lbl} style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:18}}>{item.icon}</span>
                <div>
                  <div style={{fontSize:8,color:C.sub}}>{item.lbl}</div>
                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:500}}>
                    {fmtTime(item.v)}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>

      </>)}
    </div>
  );
}

// Mount the app into the <div id="root"> in the HTML
ReactDOM.createRoot(document.getElementById('root')).render(<TideTrack/>);
</script>
</body>
</html>
