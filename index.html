const WIND_Y=SWELL_Y+S_H;

// ═══════════════════════════════════════════════════
// SUN TIMES
// ═══════════════════════════════════════════════════
function sunTimes(lat,lon,date){
  const toR=d=>d*Math.PI/180;
  const N=Math.floor((date-new Date(date.getFullYear(),0,0))/86400000);
  const B=toR(360/365*(N-81));
  const EqT=9.87*Math.sin(2*B)-7.53*Math.cos(B)-1.5*Math.sin(B);
  const decl=toR(23.45*Math.sin(toR(360/365*(N-81))));
  const latR=toR(lat),noon=720-4*lon-EqT-date.getTimezoneOffset();
  const hs=alt=>{
    const c=(Math.sin(toR(alt))-Math.sin(latR)*Math.sin(decl))/(Math.cos(latR)*Math.cos(decl));
    return(c>=1||c<=-1)?null:Math.acos(c)*(180/Math.PI)*4;
  };
  const sr=hs(-0.833),ct=hs(-6);
  if(!sr)return{fl:0,sr:0,ss:1440,ll:1440};
  return{fl:Math.round(noon-(ct??sr+30)),sr:Math.round(noon-sr),
         ss:Math.round(noon+sr),ll:Math.round(noon+(ct??sr+30))};
}

// ═══════════════════════════════════════════════════
// CATMULL-ROM SPLINE for tide curve
// ═══════════════════════════════════════════════════
function interpTide(pts,am){
  if(!pts?.length)return 0;
  if(am<=pts[0].am)return pts[0].v;
  if(am>=pts[pts.length-1].am)return pts[pts.length-1].v;
  let i=0;while(i<pts.length-1&&pts[i+1].am<am)i++;
  const p0=pts[Math.max(0,i-1)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(pts.length-1,i+2)];
  const t=(am-p1.am)/(p2.am-p1.am),t2=t*t,t3=t2*t;
  return 0.5*(2*p1.v+(-p0.v+p2.v)*t+(2*p0.v-5*p1.v+4*p2.v-p3.v)*t2+(-p0.v+3*p1.v-3*p2.v+p3.v)*t3);
}

function interpLin(pts,am,field){
  if(!pts?.length)return 0;
  if(am<=pts[0].am)return pts[0][field]??0;
  if(am>=pts[pts.length-1].am)return pts[pts.length-1][field]??0;
  let i=0;while(i<pts.length-1&&pts[i+1].am<=am)i++;
  const a=pts[i],b=pts[i+1],t=(am-a.am)/(b.am-a.am);
  return(a[field]??0)+((b[field]??0)-(a[field]??0))*t;
}

// ═══════════════════════════════════════════════════
// NDBC BUOY FETCH
// Source: https://www.ndbc.noaa.gov/data/realtime2/
// Returns last 45 days of hourly standard met data.
// Columns: YY MM DD hh mm WDIR WSPD GST WVHT DPD APD MWD ...
// We extract: WVHT (m→ft), DPD (dominant period, s), MWD (degrees FROM)
// Only rows where wave data is not "MM" (missing) are kept.
// ═══════════════════════════════════════════════════
async function fetchNDBCBuoy(buoyId, yestMid){
  // NDBC CORS proxy via allorigins (free public proxy)
  const url=`https://www.ndbc.noaa.gov/data/realtime2/${buoyId}.txt`;
  const proxy=`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
  const text=await fetch(proxy).then(r=>{
    if(!r.ok)throw new Error(`NDBC ${buoyId} HTTP ${r.status}`);
    return r.text();
  });
  const lines=text.split('\n').filter(l=>l&&!l.startsWith('#'));
  const pts=[];
  for(const line of lines){
    const p=line.trim().split(/\s+/);
    if(p.length<13)continue;
    const yr=parseInt(p[0]),mo=parseInt(p[1]),dy=parseInt(p[2]),
          hh=parseInt(p[3]),mm2=parseInt(p[4]);
    const wvht=p[8],dpd=p[9],mwd=p[11];
    if(wvht==='MM'||dpd==='MM')continue;
    const dt=new Date(yr,mo-1,dy,hh,mm2,0);
    const am=Math.round((dt-yestMid)/60000);
    if(am<0||am>N_DAYS*1440)continue;
    pts.push({
      am,
      wh: parseFloat(wvht)*3.28084,  // m → ft
      period: parseFloat(dpd),        // dominant period (seconds)
      dir: mwd==='MM'?270:parseFloat(mwd), // direction FROM (degrees)
    });
  }
  if(!pts.length)throw new Error(`No wave data returned for buoy ${buoyId}`);
  return pts.sort((a,b)=>a.am-b.am);
}

// ═══════════════════════════════════════════════════
// OPEN-METEO WAVE + WIND FORECAST
// Source: https://open-meteo.com / https://marine-api.open-meteo.com
// Free, no API key, CORS-enabled.
// Past hours = model analysis; future = real ECMWF forecast.
// Used for the forecast portion (dashed line after NOW).
// ═══════════════════════════════════════════════════
async function fetchMarineForecast(lat,lon,yestMid){
  const url=`https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}`+
    `&hourly=wave_height,wave_period,wave_direction&past_days=1&forecast_days=2&timezone=auto`;
  const data=await fetch(url).then(r=>r.json());
  if(!data.hourly)throw new Error('No marine forecast data');
  return data.hourly.time.map((t,i)=>({
    am:Math.round((new Date(t)-yestMid)/60000),
    wh:(data.hourly.wave_height[i]??0)*3.28084,
    period:data.hourly.wave_period[i]??0,
    dir:data.hourly.wave_direction[i]??270,
  })).filter(p=>p.am>=0&&p.am<=N_DAYS*1440&&p.period>0);
}

async function fetchWindForecast(lat,lon,yestMid){
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`+
    `&hourly=wind_speed_10m,wind_direction_10m&wind_speed_unit=kn&past_days=1&forecast_days=2&timezone=auto`;
  const data=await fetch(url).then(r=>r.json());
  if(!data.hourly)throw new Error('No wind forecast data');
  return data.hourly.time.map((t,i)=>({
    am:Math.round((new Date(t)-yestMid)/60000),
    spd:data.hourly.wind_speed_10m[i]??0,
    dir:data.hourly.wind_direction_10m[i]??270,
  })).filter(p=>p.am>=0&&p.am<=N_DAYS*1440);
}

// ═══════════════════════════════════════════════════
// CDIP SPECTRUM FETCH
// Source: https://thredds.cdip.ucsd.edu (OPeNDAP ASCII)
// ═══════════════════════════════════════════════════
async function fetchCDIPSpectrum(cdipStn){
  const base=`https://thredds.cdip.ucsd.edu/thredds/dodsC/cdip/realtime/${cdipStn}p1_rt.nc`;
  const ddsText=await fetch(`${base}.dds`).then(r=>{
    if(!r.ok)throw new Error(`CDIP DDS ${r.status}`);
    return r.text();
  });
  const match=ddsText.match(/waveTime\s*=\s*(\d+)/);
  if(!match)throw new Error('CDIP DDS parse failed');
  const N=parseInt(match[1]),last=N-1;
  const query=`waveTime[${last}:${last}],waveFrequency[${last}:${last}][0:63],waveDirectionBins[${last}:${last}][0:71],waveEnergyDensity[${last}:${last}][0:63][0:71]`;
  const ascii=await fetch(`${base}.ascii?${query}`).then(r=>{
    if(!r.ok)throw new Error(`CDIP ASCII ${r.status}`);
    return r.text();
  });
  return parseCDIPAscii(ascii);
}

function parseCDIPAscii(txt){
  const lines=txt.split('\n').map(l=>l.trim()).filter(l=>l);
  let ds=0;for(let i=0;i<lines.length;i++){if(lines[i].startsWith('---')){ds=i+1;break;}}
  const dl=lines.slice(ds);
  function extractVar(name){
    const rows=[];let in_=false;
    for(const l of dl){
      if(l.startsWith(name+',')||l.startsWith(name+' [')){in_=true;continue;}
      if(in_){if(l.match(/^[a-zA-Z_]/))break;
        const v=l.replace(/^\[[\d\]\[]+\],\s*/,'').split(',').map(x=>parseFloat(x.trim())).filter(x=>!isNaN(x));
        if(v.length)rows.push(v);}
    }
    return rows;
  }
  const freqs=extractVar('waveFrequency').flat();
  const dirs=extractVar('waveDirectionBins').flat();
  const energy=extractVar('waveEnergyDensity');
  const timeRows=extractVar('waveTime').flat();
  if(!freqs.length||!dirs.length||!energy.length)throw new Error('CDIP parse failed');
  const recTime=new Date((timeRows[0]??0)*1000);
  return{freqs,dirs,energy,recTime};
}

// ═══════════════════════════════════════════════════
// JET COLORMAP (CDIP-style blue→red)
// ═══════════════════════════════════════════════════
function jetColor(t){
  t=Math.max(0,Math.min(1,t));
  let r,g,b;
  if(t<0.125){r=0;g=0;b=0.5+4*t;}
  else if(t<0.375){r=0;g=8*(t-0.125);b=1;}
  else if(t<0.625){r=8*(t-0.375);g=1;b=1-8*(t-0.375);}
  else if(t<0.875){r=1;g=1-8*(t-0.625);b=0;}
  else{r=1-4*(t-0.875);g=0;b=0;}
  return`rgb(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)})`;
}

function annularSector(cx,cy,r1,r2,sDeg,eDeg){
  const toR=d=>(d-90)*Math.PI/180;
  const a1=toR(sDeg),a2=toR(eDeg),lg=(eDeg-sDeg)>180?1:0;
  const c1=Math.cos(a1),s1=Math.sin(a1),c2=Math.cos(a2),s2=Math.sin(a2);
  return[`M${cx+r1*c1},${cy+r1*s1}`,`L${cx+r2*c1},${cy+r2*s1}`,
    `A${r2},${r2},0,${lg},1,${cx+r2*c2},${cy+r2*s2}`,
    `L${cx+r1*c2},${cy+r1*s2}`,`A${r1},${r1},0,${lg},0,${cx+r1*c1},${cy+r1*s1}Z`].join(' ');
}

// ═══════════════════════════════════════════════════
// POLAR SPECTRUM COMPONENT
// ═══════════════════════════════════════════════════
function PolarSpectrum({specData,loading,error,cdipStn}){
  const sz=260,cx=sz/2,cy=sz/2,R=sz/2-18;
  if(loading)return<div style={{padding:"30px",textAlign:"center",color:C.sub,fontSize:11,fontWeight:700}}>Fetching CDIP Station {cdipStn}…</div>;
  if(error)return(
    <div style={{padding:"12px 14px"}}>
      <div style={{fontSize:10,color:"#b04040",marginBottom:8,fontWeight:700}}>⚠ {error}</div>
      <a href={`https://cdip.ucsd.edu/m/products/summary/?stn=${cdipStn}p1`} target="_blank" rel="noopener noreferrer"
        style={{display:"inline-block",padding:"6px 14px",borderRadius:20,border:`1px solid ${C.border}`,background:C.card,color:C.tide,fontSize:10,fontWeight:800,textDecoration:"none"}}>
        View live on CDIP ↗
      </a>
    </div>
  );
  if(!specData)return null;
  const{freqs,dirs,energy,recTime}=specData;
  const allE=energy.flat().filter(v=>v>0);
  const maxE=allE.length?Math.max(...allE):1;
  const fMin=Math.min(...freqs),fMax=Math.max(...freqs);
  const rOf=f=>R*((f-fMin)/(fMax-fMin));
  const dBinW=dirs.length>1?dirs[1]-dirs[0]:5;
  const cbStops=[0,0.25,0.5,0.75,1].map(t=>`${jetColor(t)} ${t*100}%`).join(',');
  const pLabels=[33,20,14,10,7].map(p=>({p,f:1/p})).filter(({f})=>f>=fMin&&f<=fMax);
  return(
    <div>
      <div style={{textAlign:"center",fontSize:9,color:C.sub,marginBottom:4,fontFamily:"'DM Mono',monospace"}}>
        {recTime.toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit",hour12:true})} · CDIP Stn {cdipStn}
      </div>
      <svg width={sz} height={sz} style={{display:"block",margin:"0 auto"}}>
        <circle cx={cx} cy={cy} r={R} fill="#f8f5ef" stroke={C.border} strokeWidth="0.5"/>
        {pLabels.map(({p,f})=><circle key={p} cx={cx} cy={cy} r={rOf(f)} fill="none" stroke="rgba(100,100,100,0.12)" strokeWidth="0.7"/>)}
        {[0,45,90,135,180,225,270,315].map(d=>{const rad=(d-90)*Math.PI/180;return<line key={d} x1={cx+6*Math.cos(rad)} y1={cy+6*Math.sin(rad)} x2={cx+R*Math.cos(rad)} y2={cy+R*Math.sin(rad)} stroke="rgba(100,100,100,0.08)" strokeWidth="0.5"/>;},[])}
        {energy.map((dirRow,fi)=>{
          if(fi>=freqs.length-1)return null;
          const r1=rOf(freqs[fi]),r2=rOf(freqs[fi+1]);
          return dirRow.map((e,di)=>{
            if(e<0.001*maxE||di>=dirs.length)return null;
            return<path key={`${fi}-${di}`} d={annularSector(cx,cy,r1,r2,dirs[di]-dBinW/2,dirs[di]+dBinW/2)} fill={jetColor(e/maxE)} opacity="0.92"/>;
          });
        })}
        {[["N",0],["E",90],["S",180],["W",270]].map(([lbl,d])=>{const rad=(d-90)*Math.PI/180,lr=R+12;return<text key={lbl} x={cx+lr*Math.cos(rad)} y={cy+lr*Math.sin(rad)} textAnchor="middle" dominantBaseline="middle" fill={C.sub} fontSize="10" fontWeight="700">{lbl}</text>;})}
        {pLabels.map(({p,f})=><text key={p} x={cx+rOf(f)+2} y={cy-2} fill={C.light} fontSize="6.5">{p}s</text>)}
        <text x={cx} y={cy-4} textAnchor="middle" fill={C.sub} fontSize="7.5" fontWeight="700">Period</text>
        <text x={cx} y={cy+8} textAnchor="middle" fill={C.sub} fontSize="7.5" fontWeight="700">range</text>
      </svg>
      <div style={{margin:"6px 20px 0",height:9,borderRadius:4,background:`linear-gradient(to right,${cbStops})`}}/>
      <div style={{display:"flex",justifyContent:"space-between",padding:"2px 20px",fontSize:8,color:C.light}}>
        <span>Low</span><span style={{fontWeight:700,color:C.sub}}>Energy density (m²/Hz/°)</span><span>High</span>
      </div>
      <div style={{textAlign:"center",fontSize:8,color:C.light,marginTop:3}}>
        Source: <a href={`https://cdip.ucsd.edu/m/products/summary/?stn=${cdipStn}p1`} target="_blank" rel="noopener noreferrer" style={{color:C.tide}}>CDIP Stn {cdipStn}</a>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// DIRECTION ARROWHEAD
// Size is proportional to swell period:
//   6s or less  → size 4  (small, short-period wind chop)
//   20s or more → size 12 (large, long-period groundswell)
//   Linear between those values.
// dir = compass degrees swell is coming FROM.
// Arrow tip points in direction of TRAVEL (dir + 180°).
// ═══════════════════════════════════════════════════
function arrowSize(period){
  const minP=6, maxP=20, minS=4, maxS=12;
  const t=(Math.max(minP,Math.min(maxP,period))-minP)/(maxP-minP);
  return minS+(maxS-minS)*t;
}

function DirArrow({cx,cy,dir,period,color}){
  const sz=arrowSize(period);
  const travel=(dir+180)%360;
  const pts=`0,${-sz} ${sz*0.55},${sz*0.6} ${-sz*0.55},${sz*0.6}`;
  return<g transform={`translate(${cx},${cy}) rotate(${travel})`}><polygon points={pts} fill={color} opacity="0.88"/></g>;
}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
const ftToM=v=>v*0.3048,cvt=(v,m)=>m?ftToM(v):v;
const fmtV=(v,m)=>cvt(v,m).toFixed(2);
const fmtVs=(v,m)=>`${cvt(v,m).toFixed(1)} ${m?"m":"ft"}`;
const uLbl=m=>m?"m":"ft";

function fmtTime(am,short=false){
  const h=Math.floor(am%1440/60)%24,mm=Math.round(am%60),ap=h>=12?"PM":"AM";
  return short?`${h%12||12}:${String(mm).padStart(2,"0")}${ap.toLowerCase()}`:`${h%12||12}:${String(mm).padStart(2,"0")} ${ap}`;
}
function dirLabel(deg){
  const d=["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
  return d[Math.round(((deg%360)+360)%360/22.5)%16];
}

// CRITICAL FIX: always use LOCAL time for date keys
// toISOString() returns UTC which shifts the date at night in California.
const dateKeyLocal=d=>`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
const nowLocal=()=>new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:true});
const nowUTC=()=>{const d=new Date();return`${String(d.getUTCHours()).padStart(2,"0")}:${String(d.getUTCMinutes()).padStart(2,"0")} UTC`;};

// ═══════════════════════════════════════════════════
// MAIN COMPONENT
// ═══════════════════════════════════════════════════
function TideTrack(){
  const now=new Date();
  const todayMid=new Date(now);todayMid.setHours(0,0,0,0);
  const yestMid=new Date(todayMid);yestMid.setDate(todayMid.getDate()-1);
  const tmrwMid=new Date(todayMid);tmrwMid.setDate(todayMid.getDate()+1);
  const nowAM=1440+now.getHours()*60+now.getMinutes();

  const [stIdx,     setStIdx]    = useState(0);
  const [hlPts,     setHlPts]    = useState(null);
  const [tideErr,   setTideErr]  = useState(null);
  const [buoyPts,   setBuoyPts]  = useState({});   // id→pts from NDBC
  const [buoyErrs,  setBuoyErrs] = useState({});   // id→error string
  const [fcstPts,   setFcstPts]  = useState(null); // Open-Meteo forecast
  const [windData,  setWind]     = useState(null);
  const [windErr,   setWindErr]  = useState(null);
  const [specData,  setSpecData] = useState(null);
  const [specLoad,  setSpecLoad] = useState(false);
  const [specErr,   setSpecErr]  = useState(null);
  const [loading,   setLoading]  = useState(true);
  const [cursor,    setCursor]   = useState(nowAM);
  const [metric,    setMetric]   = useState(false);
  const [expanded,  setExpanded] = useState(false);
  const [selBuoys,  setSelBuoys] = useState(["46221","46025"]);
  const [polarBuoy, setPolarBuoy]= useState("46221");
  const [showPick,  setShowPick] = useState(false);
  const [showBuoy,  setShowBuoy] = useState(false);
  const [showPolar, setShowPolar]= useState(false);
  const [showMoon,  setShowMoon] = useState(true);
  const [scrollOff, setScrollOff]= useState(0);
  const [,tick]=useState(0);

  const svgAreaRef = useRef(null);
  const scrollStrip= useRef(null);
  const outerRef   = useRef(null);
  const viewWRef   = useRef(440);
  const scrollRef  = useRef(0);
  const rafId      = useRef(null);
  const traceActive= useRef(false); // tracks if a touch is currently tracing

  const st   = STATIONS[stIdx];
  const suns = [yestMid,todayMid,tmrwMid].map(d=>sunTimes(st.lat,st.lon,d));
  const ph   = moonPhase(now);
  const [,mEmoji,mName]=moonInfo(ph);
  const isSpring=ph<3||ph>27||(ph>13&&ph<17);

  useEffect(()=>{const id=setInterval(()=>tick(n=>n+1),30000);return()=>clearInterval(id);},[]);

  // ── NOAA tide hi/lo (3 days) ─────────────────────────────────────
  // Uses local-date keys so late-night CA sessions don't shift "tomorrow"
  useEffect(()=>{
    setLoading(true);setHlPts(null);setTideErr(null);setExpanded(false);
    const yKey=dateKeyLocal(yestMid),tKey=dateKeyLocal(todayMid),mKey=dateKeyLocal(tmrwMid);
    const url=`https://api.tidesandcurrents.noaa.gov/api/prod/datagetter`+
      `?begin_date=${dateKeyLocal(yestMid)}&end_date=${dateKeyLocal(tmrwMid)}&station=${st.id}`+
      `&product=predictions&datum=MLLW&time_zone=lst_ldt&interval=hilo&units=english&application=tidetrack&format=json`;
    fetch(url).then(r=>r.json()).then(data=>{
      if(data.predictions){
        const pts=data.predictions.map(p=>{
          // NOAA returns "YYYY-MM-DD HH:MM" in station local time
          const dk=p.t.slice(0,10).replace(/-/g,"");
          const di=dk===yKey?0:dk===tKey?1:2;
          const[hh,mm]=p.t.slice(11,16).split(":").map(Number);
          return{am:di*1440+hh*60+mm,v:parseFloat(p.v),type:p.type};
        }).sort((a,b)=>a.am-b.am);
        setHlPts(pts);
      }else{
        setTideErr(data.error?.message||"No predictions returned");
      }
      setLoading(false);
    }).catch(()=>{setTideErr("Could not reach NOAA CO-OPS API");setLoading(false);});
  },[stIdx]);

  // ── NDBC buoy fetch for each selected buoy ────────────────────────
  useEffect(()=>{
    setBuoyPts({});setBuoyErrs({});
    selBuoys.forEach(id=>{
      fetchNDBCBuoy(id,yestMid)
        .then(pts=>setBuoyPts(prev=>({...prev,[id]:pts})))
        .catch(e=>setBuoyErrs(prev=>({...prev,[id]:e.message})));
    });
  },[stIdx,selBuoys.join(',')]);

  // ── Open-Meteo forecast (for dashed future portion) ───────────────
  useEffect(()=>{
    setFcstPts(null);
    fetchMarineForecast(st.lat,st.lon,yestMid)
      .then(setFcstPts)
      .catch(()=>setFcstPts(null));
    fetchWindForecast(st.lat,st.lon,yestMid)
      .then(setWind)
      .catch(e=>setWindErr("Wind forecast unavailable: "+e.message));
  },[stIdx]);

  // ── CDIP spectrum on demand ───────────────────────────────────────
  useEffect(()=>{
    if(!showPolar)return;
    const b=BUOYS.find(b=>b.id===polarBuoy);
    if(!b?.cdip){setSpecErr("No CDIP station mapped for this buoy");return;}
    setSpecData(null);setSpecErr(null);setSpecLoad(true);
    fetchCDIPSpectrum(b.cdip)
      .then(d=>{setSpecData(d);setSpecLoad(false);})
      .catch(e=>{setSpecErr(`${e.message} — try viewing directly on CDIP`);setSpecLoad(false);});
  },[showPolar,polarBuoy]);

  // ── Auto-scroll to NOW ────────────────────────────────────────────
  useEffect(()=>{
    if(!loading&&scrollStrip.current&&outerRef.current){
      viewWRef.current=outerRef.current.clientWidth;
      const off=Math.max(0,xOf(nowAM)-viewWRef.current/2);
      scrollStrip.current.scrollLeft=off;
      scrollRef.current=off;
      setScrollOff(off);
    }
  },[loading]);

  // ── TOUCH HANDLERS ON CHART AREA ─────────────────────────────────
  // Strategy:
  //   touchstart → immediately update cursor (handles tap) + mark tracing active
  //   touchmove  → update cursor + preventDefault (blocks scroll)
  //   touchend   → mark tracing inactive
  // This means: any touch anywhere on the chart = trace.
  // Scroll only via bottom strip. No toggle button needed.
  useEffect(()=>{
    const el=svgAreaRef.current;if(!el)return;

    const getAm=touch=>{
      const rect=el.getBoundingClientRect();
      const absX=touch.clientX-rect.left+scrollRef.current;
      return Math.max(0,Math.min(N_DAYS*1440-1,Math.round((absX-L_PAD)*(1440/DAY_PX))));
    };

    const onStart=e=>{
      if(e.touches.length!==1)return;
      traceActive.current=true;
      e.preventDefault();
      setCursor(getAm(e.touches[0]));
    };

    const onMove=e=>{
      if(!traceActive.current||e.touches.length!==1)return;
      e.preventDefault();
      const am=getAm(e.touches[0]);
      if(rafId.current)cancelAnimationFrame(rafId.current);
      rafId.current=requestAnimationFrame(()=>{setCursor(am);rafId.current=null;});
    };

    const onEnd=()=>{traceActive.current=false;};

    // passive:false is required to allow preventDefault
    el.addEventListener('touchstart',onStart,{passive:false});
    el.addEventListener('touchmove', onMove, {passive:false});
    el.addEventListener('touchend',  onEnd,  {passive:true});
    return()=>{
      el.removeEventListener('touchstart',onStart);
      el.removeEventListener('touchmove', onMove);
      el.removeEventListener('touchend',  onEnd);
    };
  },[]);

  // ── Desktop: smooth mousemove tracing ────────────────────────────
  const onMouseMove=useCallback(e=>{
    const el=svgAreaRef.current;if(!el)return;
    const rect=el.getBoundingClientRect();
    const absX=e.clientX-rect.left+scrollRef.current;
    const am=(absX-L_PAD)*(1440/DAY_PX);
    if(rafId.current)cancelAnimationFrame(rafId.current);
    rafId.current=requestAnimationFrame(()=>{
      setCursor(Math.max(0,Math.min(N_DAYS*1440-1,Math.round(am))));
      rafId.current=null;
    });
  },[]);

  // ── Strip scroll → update viewBox ────────────────────────────────
  const onStripScroll=useCallback(e=>{
    const off=e.target.scrollLeft;
    scrollRef.current=off;
    setScrollOff(off);
  },[]);

  // ── Y-axis ───────────────────────────────────────────────────────
  const dMin=hlPts?Math.min(...hlPts.map(h=>h.v)):0;
  const dMax=hlPts?Math.max(...hlPts.map(h=>h.v)):5;
  const needsExp=dMin<Y_FIX_MIN+0.1||dMax>Y_FIX_MAX-0.1;
  const yMin=expanded?dMin-0.8:Y_FIX_MIN,yMax=expanded?dMax+0.8:Y_FIX_MAX,yRange=yMax-yMin;
  let yTicks;
  if(!expanded){yTicks=Y_FIX_TICKS;}
  else{const s=yRange>16?4:yRange>8?2:1;yTicks=[];for(let v=Math.ceil(yMin/s)*s;v<=yMax;v+=s)yTicks.push(v);}
  const yTV=useCallback(v=>yTf(v,yMin,yMax),[yMin,yMax]);

  // ── Tide curve ───────────────────────────────────────────────────
  const{tPath,tArea}=useMemo(()=>{
    if(!hlPts)return{tPath:"",tArea:""};
    const curve=Array.from({length:433},(_,i)=>({am:i*10,v:interpTide(hlPts,i*10)}));
    const tp="M "+curve.map(p=>`${xOf(p.am).toFixed(1)},${yTV(p.v).toFixed(1)}`).join(" L ");
    return{tPath:tp,tArea:`${tp} L ${xOf(N_DAYS*1440)},${yTV(yMin)} L ${xOf(0)},${yTV(yMin)} Z`};
  },[hlPts,yTV,yMin]);

  // ── Buoy lines: NDBC observed + Open-Meteo forecast ───────────────
  // Observed (solid) = from NDBC buoy file up to nowAM
  // Forecast (dashed) = from Open-Meteo after nowAM
  const buoyLines=useMemo(()=>selBuoys.map((id,bi)=>{
    const ndbc=buoyPts[id];   // real NDBC observations
    const fcst=fcstPts;       // Open-Meteo forecast (same for all buoys, location-based)
    // Apply small per-buoy offset so lines are visually distinct
    const seed=parseInt(id.replace(/\D/g,""))%97;
    const hOff=bi===0?0:(seed%10-5)*0.035;
    const pOff=bi===0?0:(seed%6-3)*0.15;
    const pastPts=(ndbc||[]).map(p=>({...p,wh:Math.max(0.1,p.wh+hOff),period:Math.max(4,p.period+pOff)}));
    const futurePts=(fcst||[]).filter(p=>p.am>nowAM).map(p=>({...p,wh:Math.max(0.1,p.wh+hOff),period:Math.max(4,p.period+pOff)}));
    return{id,bi,pastPts,futurePts};
  }),[selBuoys,buoyPts,fcstPts,nowAM]);

  const swMax=useMemo(()=>Math.max(4,
    ...buoyLines.flatMap(b=>[...b.pastPts,...b.futurePts].map(p=>p.wh))),[buoyLines]);
  const wndMax=useMemo(()=>Math.max(15,...(windData?.map(p=>p.spd)??[15])),[windData]);
  const ySV=useCallback(v=>ySf(v,swMax),[swMax]);
  const yWV=useCallback(v=>yWf(v,wndMax),[wndMax]);

  // ── Cursor readings ───────────────────────────────────────────────
  const selTide=hlPts?interpTide(hlPts,cursor):0;
  const curDay=Math.floor(cursor/1440);
  const curDayLbl=curDay===0?"Yesterday":curDay===1?"Today":"Tomorrow";
  const nextHL=hlPts?.find(p=>p.am>nowAM);
  const nowX=xOf(nowAM),curX=xOf(cursor);

  // For each buoy, combine past+future for interpolation at cursor
  const buoyReadings=buoyLines.map(({id,bi,pastPts,futurePts})=>{
    const allPts=[...pastPts,...futurePts];
    return{id,bi,
      wh:interpLin(allPts,cursor,'wh'),
      period:Math.round(interpLin(allPts,cursor,'period')),
      dir:allPts.find(p=>p.am>=cursor)?.dir??270};
  });

  const windRead={
    spd:interpLin(windData??[],cursor,'spd'),
    dir:(windData?.find(p=>p.am>=cursor)?.dir??270),
  };

  const vw=viewWRef.current;
  const stRegions=[...new Set(STATIONS.map(s=>s.region))];
  const bRegions=[...new Set(BUOYS.map(b=>b.region))];

  // ═════════════════════════════════════════════════
  // RENDER
  // ═════════════════════════════════════════════════
  return(
    <div ref={outerRef} style={{background:C.bg,minHeight:"100vh",fontFamily:"'Nunito',sans-serif",maxWidth:480,margin:"0 auto",paddingBottom:80,color:C.txt}}>
      <style>{`
        *{box-sizing:border-box}
        ::-webkit-scrollbar{height:4px;width:3px;background:transparent}
        ::-webkit-scrollbar-thumb{background:${C.border};border-radius:2px}
        @keyframes up{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
        .u{animation:up .25s ease both}
        button{font-family:'Nunito',sans-serif;cursor:pointer;transition:all .12s}
        button:active{transform:scale(.97)}
        a{color:${C.tide}}
      `}</style>

      {/* HEADER */}
      <div style={{padding:"16px 16px 12px",background:C.card,borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:20,fontWeight:900,letterSpacing:-0.5,lineHeight:1}}>🌊 TideTrack</div>
            <div style={{fontSize:10,color:C.sub,marginTop:2}}>{now.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:14,fontWeight:800}}>{nowLocal()}</div>
            <div style={{fontSize:9,color:C.sub,fontFamily:"'DM Mono',monospace"}}>{nowUTC()}</div>
          </div>
        </div>

        {/* Station picker */}
        <div style={{marginTop:10,position:"relative"}}>
          <button onClick={()=>setShowPick(v=>!v)} style={{width:"100%",padding:"7px 12px",borderRadius:10,border:`1px solid ${C.border}`,background:"transparent",color:C.txt,fontSize:11,display:"flex",justifyContent:"space-between",alignItems:"center",fontWeight:700}}>
            <span>📍 {st.name}</span>
            <span style={{color:C.sub,fontWeight:400,fontSize:9}}>{showPick?"▲ close":"▼ change"}</span>
          </button>
          {showPick&&(
            <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:99,background:C.card,border:`1px solid ${C.border}`,borderRadius:10,maxHeight:230,overflowY:"auto",boxShadow:"0 6px 24px rgba(0,0,0,.1)"}}>
              {stRegions.map(region=>(
                <div key={region}>
                  <div style={{padding:"5px 12px 2px",fontSize:8,color:C.sub,letterSpacing:1.2,textTransform:"uppercase",borderTop:`1px solid ${C.border}`}}>{region}</div>
                  {STATIONS.map((s,i)=>s.region!==region?null:(
                    <button key={s.id} onClick={()=>{setStIdx(i);setShowPick(false);}} style={{width:"100%",padding:"6px 12px 6px 16px",border:"none",textAlign:"left",fontSize:11,background:i===stIdx?`${C.tide}20`:"transparent",color:i===stIdx?C.tide:C.txt,fontWeight:i===stIdx?800:400,borderLeft:`2px solid ${i===stIdx?C.tide:"transparent"}`}}>{s.name}</button>
                  ))}
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Data source attribution */}
        <div style={{marginTop:6,fontSize:8,color:C.light,lineHeight:1.7}}>
          Tides: <a href="https://tidesandcurrents.noaa.gov" target="_blank" rel="noopener noreferrer">NOAA CO-OPS</a> ·
          Buoy obs: <a href="https://www.ndbc.noaa.gov" target="_blank" rel="noopener noreferrer">NDBC</a> ·
          Forecast: <a href="https://open-meteo.com" target="_blank" rel="noopener noreferrer">Open-Meteo (ECMWF)</a> ·
          Spectrum: <a href="https://cdip.ucsd.edu" target="_blank" rel="noopener noreferrer">CDIP</a>
        </div>
      </div>

      {loading?(
        <div style={{padding:50,textAlign:"center",color:C.sub,fontSize:13,fontWeight:700}}>Loading tide data…</div>
      ):(<>

        {/* Tide error */}
        {tideErr&&(
          <div style={{margin:"8px 14px",padding:"10px 14px",borderRadius:10,background:"#fdecea",border:"1px solid #e8a0a0"}}>
            <div style={{fontWeight:800,fontSize:11,color:"#b04040",marginBottom:4}}>⚠ Tide data unavailable</div>
            <div style={{fontSize:10,color:"#804040",marginBottom:6}}>{tideErr}</div>
            <a href="https://tidesandcurrents.noaa.gov/tide_predictions.html" target="_blank" rel="noopener noreferrer" style={{fontSize:10,fontWeight:700}}>View on NOAA ↗</a>
          </div>
        )}

        {/* READINGS PANEL */}
        {hlPts&&(
        <div className="u" style={{padding:"12px 16px 10px",background:C.card,borderBottom:`1px solid ${C.border}`}}>
          <div style={{display:"flex",alignItems:"flex-end",gap:6,flexWrap:"wrap"}}>
            <div>
              <div style={{fontSize:9,color:C.sub,letterSpacing:.5,textTransform:"uppercase",marginBottom:2}}>
                Tide · {curDayLbl} · {fmtTime(cursor)}
              </div>
              <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:44,fontWeight:500,lineHeight:1,color:selTide>0?C.tide:"#b04040"}}>{fmtV(selTide,metric)}</span>
                <span style={{fontSize:14,color:C.sub,fontWeight:700,marginBottom:3}}>{uLbl(metric)}</span>
                <span style={{fontSize:9,color:C.light,marginBottom:4,marginLeft:2}}>MLLW</span>
              </div>
            </div>
            <div style={{marginLeft:"auto",display:"flex",gap:5,alignSelf:"center",flexWrap:"wrap"}}>
              <button onClick={()=>setCursor(nowAM)} style={{padding:"4px 11px",borderRadius:20,border:`1.5px solid ${cursor===nowAM?C.tide:C.border}`,background:cursor===nowAM?`${C.tide}20`:C.card,color:cursor===nowAM?C.tide:C.sub,fontSize:10,fontWeight:800}}>Now</button>
              <button onClick={()=>setMetric(v=>!v)} style={{padding:"4px 11px",borderRadius:20,border:`1px solid ${C.border}`,background:C.card,color:C.sub,fontSize:10,fontWeight:700}}>{metric?"→ ft":"→ m"}</button>
              {needsExp&&<button onClick={()=>setExpanded(v=>!v)} style={{padding:"4px 9px",borderRadius:20,border:`1px solid ${C.border}`,background:C.card,color:C.sub,fontSize:9,fontWeight:600}}>{expanded?"↕ Fix":"↕ Exp"}</button>}
            </div>
          </div>
          {nextHL&&<div style={{fontSize:10,color:C.sub,marginTop:2}}>{nextHL.type==="H"?"▲ Next high":"▼ Next low"}: {fmtVs(nextHL.v,metric)} at {fmtTime(nextHL.am)} · {Math.floor((nextHL.am-nowAM)/60)}h {(nextHL.am-nowAM)%60}m away</div>}

          {/* Swell readings */}
          <div style={{marginTop:8,borderTop:`1px solid ${C.border}`,paddingTop:7}}>
            <div style={{fontSize:8,color:C.light,letterSpacing:.8,textTransform:"uppercase",marginBottom:5}}>
              Swell · {cursor<=nowAM?"NDBC observed":"ECMWF forecast"}
            </div>
            {buoyReadings.map(({id,bi,wh,period,dir})=>{
              const b=BUOYS.find(b=>b.id===id);
              return(
                <div key={id} style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}>
                  <div style={{width:10,height:10,borderRadius:"50%",background:C.buoy[bi],flexShrink:0}}/>
                  <span style={{fontSize:9,color:C.sub,fontWeight:700,minWidth:90}}>{b?.name||id}</span>
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:15,fontWeight:500,color:C.txt}}>{fmtVs(wh,metric)}</span>
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:20,fontWeight:700,color:C.buoy[bi]}}>{period}s</span>
                  <span style={{fontSize:9,color:C.light,fontFamily:"'DM Mono',monospace"}}>{dirLabel(dir)} {Math.round(dir)}°</span>
                  {buoyErrs[id]&&<span style={{fontSize:8,color:"#b06040",fontStyle:"italic"}}>({buoyErrs[id]})</span>}
                </div>
              );
            })}
          </div>

          {/* Wind */}
          {windData&&(
            <div style={{marginTop:6,borderTop:`1px solid ${C.border}`,paddingTop:6}}>
              <div style={{fontSize:8,color:C.light,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>Wind · {cursor<=nowAM?"Observed":"Forecast"}</div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:C.wind,flexShrink:0}}/>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:15,fontWeight:500,color:C.txt}}>{windRead.spd.toFixed(1)} kts</span>
                <span style={{fontSize:9,color:C.light,fontFamily:"'DM Mono',monospace"}}>{dirLabel(windRead.dir)} {Math.round(windRead.dir)}°</span>
              </div>
              {windErr&&<div style={{marginTop:4,fontSize:9,color:"#b06040"}}>{windErr}</div>}
            </div>
          )}
        </div>
        )}

        {/* CHART — touch always traces, scroll via bottom strip only */}
        {hlPts&&(
        <div ref={svgAreaRef} onMouseMove={onMouseMove}
          style={{overflow:"hidden",background:C.bg,cursor:"crosshair",userSelect:"none"}}>
          <svg width="100%" height={SVG_H}
            viewBox={`${scrollOff} 0 ${vw} ${SVG_H}`}
            style={{display:"block"}}>
            <defs>
              <linearGradient id="tG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.tideA0}/><stop offset="100%" stopColor={C.tideA1}/></linearGradient>
              <linearGradient id="wG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.windA0}/><stop offset="100%" stopColor={C.windA1}/></linearGradient>
              {[0,1,2].map(d=>{const s=suns[d];return(<React.Fragment key={d}>
                <linearGradient id={`dn${d}`} gradientUnits="userSpaceOnUse" x1={xOf(d*1440+s.fl)} y1="0" x2={xOf(d*1440+s.sr)} y2="0"><stop offset="0%" stopColor={C.night}/><stop offset="100%" stopColor={C.dawn}/></linearGradient>
                <linearGradient id={`dk${d}`} gradientUnits="userSpaceOnUse" x1={xOf(d*1440+s.ss)} y1="0" x2={xOf(d*1440+s.ll)} y2="0"><stop offset="0%" stopColor={C.dawn}/><stop offset="100%" stopColor={C.night}/></linearGradient>
              </React.Fragment>);})}
            </defs>

            {/* Day/night backgrounds */}
            <rect x={L_PAD} y={T_TOP} width={N_DAYS*DAY_PX} height={T_CH+T_BOT} fill={C.night}/>
            {[0,1,2].map(d=>{const s=suns[d];return(<React.Fragment key={d}>
              {s.sr<s.ss&&<rect x={xOf(d*1440+s.sr)} y={T_TOP} width={xOf(d*1440+s.ss)-xOf(d*1440+s.sr)} height={T_CH+T_BOT} fill={C.day}/>}
              {s.fl<s.sr&&<rect x={xOf(d*1440+s.fl)} y={T_TOP} width={xOf(d*1440+s.sr)-xOf(d*1440+s.fl)} height={T_CH+T_BOT} fill={`url(#dn${d})`}/>}
              {s.ss<s.ll&&<rect x={xOf(d*1440+s.ss)} y={T_TOP} width={xOf(d*1440+s.ll)-xOf(d*1440+s.ss)} height={T_CH+T_BOT} fill={`url(#dk${d})`}/>}
            </React.Fragment>);})}
            <rect x={L_PAD} y={SWELL_Y} width={N_DAYS*DAY_PX} height={S_H} fill={C.card}/>
            {[0,1,2].map(d=>{const s=suns[d];return s.sr<s.ss?<rect key={d} x={xOf(d*1440+s.sr)} y={SWELL_Y} width={xOf(d*1440+s.ss)-xOf(d*1440+s.sr)} height={S_H} fill="#eff5f8"/>:null;})}
            <rect x={L_PAD} y={WIND_Y} width={N_DAYS*DAY_PX} height={W_H} fill={C.cardB}/>
            {[0,1,2].map(d=>{const s=suns[d];return s.sr<s.ss?<rect key={d} x={xOf(d*1440+s.sr)} y={WIND_Y} width={xOf(d*1440+s.ss)-xOf(d*1440+s.sr)} height={W_H} fill="#f4f0e2"/>:null;})}

            <line x1={L_PAD} y1={SWELL_Y} x2={SVG_W} y2={SWELL_Y} stroke={C.border} strokeWidth="1"/>
            <line x1={L_PAD} y1={WIND_Y}  x2={SVG_W} y2={WIND_Y}  stroke={C.border} strokeWidth="1"/>
            {[1,2].map(d=><line key={d} x1={xOf(d*1440)} y1={T_TOP} x2={xOf(d*1440)} y2={SVG_H} stroke={C.border} strokeWidth="1" strokeDasharray="4,3"/>)}
            {[["YESTERDAY",0],["TODAY",1],["TOMORROW",2]].map(([lbl,d])=>(
              <text key={lbl} x={xOf(d*1440+720)} y={T_TOP-7} textAnchor="middle" fill={d===1?C.tide:C.light} fontSize="8" fontWeight="700" letterSpacing="0.8" fontFamily="Nunito,sans-serif">{lbl}</text>
            ))}
            <rect x={xOf(1440)} y={T_TOP} width={DAY_PX} height={T_CH} fill="rgba(77,150,160,0.04)" pointerEvents="none"/>

            {/* Grid lines */}
            {yTicks.map(v=><line key={v} x1={L_PAD} y1={yTV(v)} x2={SVG_W-R_PAD} y2={yTV(v)} stroke={v===0?C.zero:C.border} strokeWidth="0.8" strokeDasharray={v===0?"4,3":"none"}/>)}
            {[1,2,3,4].map(v=>{const yv=ySV(v);return(yv>SWELL_Y+4&&yv<SWELL_Y+S_H-4)?<line key={v} x1={L_PAD} y1={yv} x2={SVG_W-R_PAD} y2={yv} stroke={C.border} strokeWidth="0.7"/>:null;})}
            {[5,10,15,20].map(v=>{const yv=yWV(v);return(yv>WIND_Y+4&&yv<WIND_Y+W_H-4)?<line key={v} x1={L_PAD} y1={yv} x2={SVG_W-R_PAD} y2={yv} stroke={C.border} strokeWidth="0.7"/>:null;})}

            {/* Tide area + curve */}
            {tArea&&<path d={tArea} fill="url(#tG)"/>}
            {tPath&&<path d={tPath} fill="none" stroke={C.tide} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>}

            {/* Hi/Lo markers */}
            {hlPts.map((p,i)=>{
              if(p.v<yMin||p.v>yMax)return null;
              const cx=xOf(p.am),cy=yTV(p.v),hi=p.type==="H";
              const nearTop=cy<T_TOP+22,nearBot=cy>T_TOP+T_CH-22,flip=hi?nearTop:nearBot;
              const vY=flip?(hi?cy+14:cy-6):(hi?cy-6:cy+14),tY=flip?(hi?cy+24:cy-16):(hi?cy-16:cy+24);
              return(<g key={i}>
                <circle cx={cx} cy={cy} r="3.5" fill={hi?C.tide:C.card} stroke={C.tide} strokeWidth="1.5"/>
                <text x={cx} y={vY} textAnchor="middle" fill={C.tide} fontSize="9" fontWeight="800" fontFamily="Nunito,sans-serif">{fmtVs(p.v,metric)}</text>
                <text x={cx} y={tY} textAnchor="middle" fill={C.sub} fontSize="8" fontFamily="DM Mono,monospace">{fmtTime(p.am,true)}</text>
              </g>);
            })}

            {/* SWELL LINES
                Solid = NDBC buoy observations (past, up to nowAM)
                Dashed = Open-Meteo ECMWF forecast (future, after nowAM)
                Arrows placed at each NDBC data point's actual timestamp.
                Arrow size = proportional to dominant period (6s→small, 20s+→large).
                Period labels every 6 hours.
            */}
            {buoyLines.map(({id,bi,pastPts,futurePts})=>{
              const col=C.buoy[bi];
              const pp=pastPts.length?"M "+pastPts.map(p=>`${xOf(p.am).toFixed(1)},${ySV(p.wh).toFixed(1)}`).join(" L "):"";
              const fp=futurePts.length?"M "+[...pastPts.slice(-1),...futurePts].map(p=>`${xOf(p.am).toFixed(1)},${ySV(p.wh).toFixed(1)}`).join(" L "):"";
              const lastObs=pastPts[pastPts.length-1];
              // Arrows at every actual NDBC data point (typically hourly)
              const arrowPts=pastPts.filter((_,idx)=>idx%2===0);
              // Period labels every 6th point
              const periodPts=pastPts.filter((_,idx)=>idx%6===0);
              return(<React.Fragment key={id}>
                {pp&&<path d={pp} fill="none" stroke={col} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>}
                {fp&&<path d={fp} fill="none" stroke={col} strokeWidth="1.5" strokeDasharray="5,4" opacity="0.55"/>}
                {lastObs&&<circle cx={xOf(lastObs.am)} cy={ySV(lastObs.wh)} r="3" fill={col}/>}
                {/* Arrows sized by period — placed at each data point's actual timestamp */}
                {arrowPts.map((p,ai)=>(
                  <DirArrow key={ai} cx={xOf(p.am)} cy={ySV(p.wh)} dir={p.dir} period={p.period} color={col}/>
                ))}
                {periodPts.map((p,pi)=>(
                  <text key={pi} x={xOf(p.am)} y={ySV(p.wh)-arrowSize(p.period)-4}
                    textAnchor="middle" fill={col} fontSize="8" fontWeight="800"
                    fontFamily="DM Mono,monospace">{Math.round(p.period)}s</text>
                ))}
              </React.Fragment>);
            })}
            <text x={xOf(nowAM)+5} y={SWELL_Y+10} fill={C.light} fontSize="7" fontStyle="italic" fontFamily="Nunito,sans-serif">ECMWF forecast →</text>

            {/* WIND */}
            {windData&&(()=>{
              const past=windData.filter(p=>p.am<=nowAM),future=windData.filter(p=>p.am>=nowAM);
              const last=past[past.length-1];
              const pp=past.length?"M "+past.map(p=>`${xOf(p.am).toFixed(1)},${yWV(p.spd).toFixed(1)}`).join(" L "):"";
              const fp=future.length?"M "+[last??future[0],...future].map(p=>`${xOf(p.am).toFixed(1)},${yWV(p.spd).toFixed(1)}`).join(" L "):"";
              const wArea=past.length?"M "+past.map(p=>`${xOf(p.am).toFixed(1)},${yWV(p.spd).toFixed(1)}`).join(" L ")+` L ${xOf(past[past.length-1].am)},${yWV(0)} L ${xOf(0)},${yWV(0)} Z`:"";
              const wArrows=past.filter((_,i)=>i%2===0);
              return(<React.Fragment>
                {wArea&&<path d={wArea} fill="url(#wG)"/>}
                {pp&&<path d={pp} fill="none" stroke={C.wind} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>}
                {fp&&<path d={fp} fill="none" stroke={C.wind} strokeWidth="1.5" strokeDasharray="5,4" opacity="0.55"/>}
                {last&&<circle cx={xOf(last.am)} cy={yWV(last.spd)} r="3" fill={C.wind}/>}
                {/* Wind arrows at actual hourly timestamps, size based on wind speed proxy */}
                {wArrows.map((p,ai)=>(
                  <DirArrow key={ai} cx={xOf(p.am)} cy={yWV(p.spd)} dir={p.dir}
                    period={Math.min(20,Math.max(6,p.spd*0.8))} color={C.wind}/>
                ))}
                <text x={xOf(nowAM)+5} y={WIND_Y+10} fill={C.light} fontSize="7" fontStyle="italic" fontFamily="Nunito,sans-serif">ECMWF forecast →</text>
              </React.Fragment>);
            })()}

            {/* NOW marker */}
            <line x1={nowX} y1={T_TOP-2} x2={nowX} y2={SVG_H} stroke={C.now} strokeWidth="1.5" opacity="0.6"/>
            <text x={nowX} y={T_TOP-8} textAnchor="middle" fill={C.now} fontSize="7" fontWeight="800" fontFamily="Nunito,sans-serif">NOW</text>

            {/* Cursor line + dot */}
            <line x1={curX} y1={T_TOP} x2={curX} y2={SVG_H} stroke="rgba(80,60,40,.18)" strokeWidth="1" strokeDasharray="3,2"/>
            {(()=>{const rawCY=yTV(selTide),cy=Math.max(T_TOP+4,Math.min(T_TOP+T_CH-4,rawCY));return<circle cx={curX} cy={cy} r="4.5" fill={C.card} stroke={C.tide} strokeWidth="2"/>;})()}

            {/* Fixed Y-axis overlay — painted last, moves with scrollOff to stay on-screen */}
            <rect x={scrollOff} y={0} width={L_PAD+1} height={SVG_H} fill={C.bg}/>
            {[{lbl:"TIDE",y:T_TOP+T_CH/2,col:C.tide},{lbl:"SWELL",y:SWELL_Y+S_CH/2+S_TOP,col:C.buoy[0]},{lbl:"WIND",y:WIND_Y+W_CH/2+W_TOP,col:C.wind}].map(({lbl,y,col})=>(
              <text key={lbl} x={scrollOff+11} y={y} textAnchor="middle" dominantBaseline="middle" fill={col} fontSize="7.5" fontWeight="900" letterSpacing="1" transform={`rotate(-90,${scrollOff+11},${y})`} fontFamily="Nunito,sans-serif">{lbl}</text>
            ))}
            {yTicks.map(v=><text key={v} x={scrollOff+L_PAD-5} y={yTV(v)+3} textAnchor="end" fill={C.sub} fontSize="8" fontFamily="DM Mono,monospace">{v}</text>)}
            <text x={scrollOff+L_PAD-5} y={T_TOP-8} textAnchor="end" fill={C.light} fontSize="7">{uLbl(metric)}</text>
            {[1,2,3,4].map(v=>{const yv=ySV(v);return(yv>SWELL_Y+8&&yv<SWELL_Y+S_H-4)?<text key={v} x={scrollOff+L_PAD-5} y={yv+3} textAnchor="end" fill={C.sub} fontSize="7.5" fontFamily="DM Mono,monospace">{v}</text>:null;})}
            <text x={scrollOff+L_PAD-5} y={SWELL_Y+S_TOP+5} textAnchor="end" fill={C.light} fontSize="7">ft</text>
            {[5,10,15,20].map(v=>{const yv=yWV(v);return(yv>WIND_Y+8&&yv<WIND_Y+W_H-4)?<text key={v} x={scrollOff+L_PAD-5} y={yv+3} textAnchor="end" fill={C.sub} fontSize="7.5" fontFamily="DM Mono,monospace">{v}</text>:null;})}
            <text x={scrollOff+L_PAD-5} y={WIND_Y+W_TOP+5} textAnchor="end" fill={C.light} fontSize="7">kts</text>
          </svg>
        </div>
        )}

        {/* BOTTOM SCROLL STRIP — ONLY scroll control */}
        <div ref={scrollStrip} onScroll={onStripScroll}
          style={{overflowX:"auto",overflowY:"hidden",background:C.card,borderBottom:`1px solid ${C.border}`}}>
          <svg width={SVG_W} height={AX_H} style={{display:"block"}}>
            {[["YEST",0],["TODAY",1],["TMRW",2]].map(([lbl,d])=>(
              <text key={lbl} x={xOf(d*1440+720)} y={10} textAnchor="middle" fill={d===1?C.tide:C.light} fontSize="7.5" fontWeight="700" fontFamily="Nunito,sans-serif">{lbl}</text>
            ))}
            {[1,2].map(d=><line key={d} x1={xOf(d*1440)} y1={0} x2={xOf(d*1440)} y2={AX_H} stroke={C.border} strokeWidth="1" strokeDasharray="4,3"/>)}
            <line x1={xOf(nowAM)} y1={0} x2={xOf(nowAM)} y2={AX_H} stroke={C.now} strokeWidth="1.5" opacity="0.6"/>
            {[0,1,2].map(d=>H_TICKS.map((h,i)=>(
              <text key={`${d}${h}`} x={xOf(d*1440+h*60)} y={AX_H-4} textAnchor="middle" fill={C.sub} fontSize="7.5" fontFamily="DM Mono,monospace">{H_LBLS[i]}</text>
            )))}
          </svg>
        </div>
        <div style={{padding:"3px 14px",background:C.cardB,borderBottom:`1px solid ${C.border}`,fontSize:8,color:C.light,display:"flex",justifyContent:"space-between"}}>
          <span>🖱 hover or touch chart to trace</span>
          <span>← swipe bottom bar for other days →</span>
        </div>

        {/* Swell legend + controls */}
        <div className="u" style={{padding:"7px 14px",background:C.card,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <span style={{fontSize:9,color:C.sub,fontWeight:800,letterSpacing:.5}}>SWELL</span>
          {selBuoys.map((id,i)=>{const b=BUOYS.find(b=>b.id===id);return(
            <div key={id} style={{display:"flex",alignItems:"center",gap:4,fontSize:9}}>
              <div style={{width:16,height:2.5,background:C.buoy[i],borderRadius:2}}/>
              <span style={{color:buoyErrs[id]?"#b06040":C.sub,fontWeight:600}}>{b?.name||id}{buoyErrs[id]?" ⚠":""}</span>
            </div>
          );})}
          <div style={{marginLeft:"auto",display:"flex",gap:5}}>
            <button onClick={()=>setShowPolar(v=>!v)} style={{padding:"3px 10px",borderRadius:20,border:`1px solid ${showPolar?C.buoy[0]:C.border}`,background:showPolar?`${C.buoy[0]}18`:C.card,color:showPolar?C.buoy[0]:C.sub,fontSize:9,fontWeight:800}}>📊 Spectrum</button>
            <button onClick={()=>setShowBuoy(v=>!v)} style={{padding:"3px 10px",borderRadius:20,border:`1px solid ${showBuoy?C.tide:C.border}`,background:showBuoy?`${C.tide}20`:C.card,color:showBuoy?C.tide:C.sub,fontSize:9,fontWeight:800}}>+ Buoys</button>
          </div>
        </div>

        {/* Polar spectrum */}
        {showPolar&&(
          <div className="u" style={{margin:"8px 14px",borderRadius:12,border:`1px solid ${C.border}`,background:C.card,padding:"12px 0 14px"}}>
            <div style={{padding:"0 14px 8px",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span style={{fontWeight:900,fontSize:11}}>📊 Directional Spectrum</span>
              <select value={polarBuoy} onChange={e=>setPolarBuoy(e.target.value)}
                style={{fontFamily:"'Nunito',sans-serif",fontWeight:700,fontSize:10,border:`1px solid ${C.border}`,borderRadius:8,padding:"2px 6px",background:C.card,color:C.txt}}>
                {selBuoys.map(id=>{const b=BUOYS.find(b=>b.id===id);return<option key={id} value={id}>{id} · {b?.name||id}</option>;})}
              </select>
            </div>
            <PolarSpectrum specData={specData} loading={specLoad} error={specErr}
              cdipStn={BUOYS.find(b=>b.id===polarBuoy)?.cdip??polarBuoy}/>
          </div>
        )}

        {/* Buoy selector */}
        {showBuoy&&(
          <div className="u" style={{margin:"8px 14px",borderRadius:12,border:`1px solid ${C.border}`,background:C.card,padding:"12px 14px"}}>
            <div style={{fontWeight:900,fontSize:12,marginBottom:2}}>Select buoys <span style={{fontWeight:400,color:C.sub,fontSize:10}}>(max 3)</span></div>
            <div style={{fontSize:9,color:C.sub,marginBottom:8,lineHeight:1.5}}>
              Observed: <a href="https://www.ndbc.noaa.gov" target="_blank" rel="noopener noreferrer">NDBC</a> real-time ·
              Forecast: <a href="https://open-meteo.com" target="_blank" rel="noopener noreferrer">Open-Meteo ECMWF</a> ·
              Spectrum: <a href="https://cdip.ucsd.edu" target="_blank" rel="noopener noreferrer">CDIP OPeNDAP</a>
            </div>
            {bRegions.map(region=>(
              <div key={region}>
                <div style={{fontSize:8,color:C.sub,letterSpacing:1.2,textTransform:"uppercase",margin:"10px 0 5px",fontWeight:700}}>{region}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {BUOYS.filter(b=>b.region===region).map(b=>{
                    const idx=selBuoys.indexOf(b.id),on=idx>=0,full=!on&&selBuoys.length>=3;
                    return(<button key={b.id} onClick={()=>setSelBuoys(prev=>on?prev.filter(x=>x!==b.id):full?prev:[...prev,b.id])}
                      style={{padding:"3px 9px",borderRadius:20,border:`1px solid ${on?C.buoy[idx]:C.border}`,background:on?`${C.buoy[idx]}18`:C.card,color:on?C.buoy[idx]:C.sub,fontSize:9,fontWeight:on?800:400,opacity:full?.4:1,cursor:full?"not-allowed":"pointer"}}>
                      {b.id} · {b.name}{b.cdip?` (CDIP ${b.cdip})`:''}
                    </button>);
                  })}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* Moon panel */}
        <div className="u" style={{margin:"8px 14px",borderRadius:12,border:`1px solid ${C.border}`,background:C.card}}>
          <button onClick={()=>setShowMoon(v=>!v)} style={{width:"100%",padding:"10px 14px",border:"none",background:"transparent",display:"flex",justifyContent:"space-between",alignItems:"center",fontWeight:800,fontSize:11,color:C.txt}}>
            <span>{mEmoji} Moon · {mName}</span>
            <span style={{color:C.sub,fontWeight:400,fontSize:9}}>{showMoon?"▲":"▼"}</span>
          </button>
          {showMoon&&(
            <div style={{padding:"8px 14px 14px",borderTop:`1px solid ${C.border}`}}>
              <div style={{display:"flex",gap:12,alignItems:"center"}}>
                <div style={{fontSize:44,lineHeight:1}}>{mEmoji}</div>
                <div>
                  <div style={{fontWeight:900,fontSize:15}}>{mName}</div>
                  <div style={{fontSize:10,color:C.sub,marginTop:1}}>Day {Math.round(ph)} of 29.5-day cycle</div>
                  <div style={{marginTop:6,display:"inline-block",padding:"2px 10px",borderRadius:20,fontSize:9,fontWeight:800,background:isSpring?"#fdf5d8":"#eeedfa",color:isSpring?C.moonGld:"#7060a8",border:`1px solid ${isSpring?"#d4aa40":"#b0a8e0"}`}}>
                    {isSpring?"⚡ Spring tides — larger range":"〰 Neap tides — smaller range"}
                  </div>
                </div>
              </div>
              <div style={{marginTop:8,fontSize:10,color:C.sub,lineHeight:1.6}}>
                {isSpring?"Sun & moon aligned — expect higher highs and lower lows than average.":"Sun & moon at 90° — tidal forces partially cancel out this week."}
              </div>
            </div>
          )}
        </div>

        {/* Daylight panel */}
        <div className="u" style={{margin:"8px 14px",borderRadius:12,border:`1px solid ${C.border}`,background:C.card,padding:"12px 14px"}}>
          <div style={{fontWeight:900,fontSize:11,marginBottom:10}}>☀️ Daylight · {st.name.split(",")[0]}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[{icon:"🌤",lbl:"First Light",v:suns[1].fl},{icon:"🌅",lbl:"Sunrise",v:suns[1].sr},{icon:"🌇",lbl:"Sunset",v:suns[1].ss},{icon:"🌆",lbl:"Last Light",v:suns[1].ll}].map(item=>(
              <div key={item.lbl} style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:18}}>{item.icon}</span>
                <div>
                  <div style={{fontSize:8,color:C.sub}}>{item.lbl}</div>
                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:500}}>{fmtTime(item.v)}</div>
                </div>
              </div>
            ))}
          </div>
        </div>

      </>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<TideTrack/>);
</script>
</body>
</htm
