<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>TideTrack</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=DM+Mono&display=swap" rel="stylesheet"/>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
html,body{margin:0;background:#f5f1eb}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useRef}=React;

/* ─── COLORS ─── */
const C={
bg:'#f5f1eb',card:'#fff',border:'#e6dfd5',
txt:'#3a3025',sub:'#a09080',
tide:'#5ba4b0',now:'#d06850',
buoy:['#c96a5a','#7a66c0','#4fa87a']
};

/* ─── BASIC DATA ─── */
const STATION={id:"9410840",name:"Santa Monica"};

const xOf=am=>40+am*0.3;
const yOf=v=>150-(v*20);

/* ─── DEMO TIDE ─── */
function tide(am){
return 2.5+2*Math.sin(am/300);
}

/* ─── DEMO BUOY ─── */
function buoy(am){
return 2+Math.sin(am/200)+Math.cos(am/80)*0.3;
}

/* ─── APP ─── */
function App(){

const [cursor,setCursor]=useState(1440);
const [followNow,setFollowNow]=useState(true);

const scrollRef=useRef(null);
const dragging=useRef(false);

/* ─── AUTO FOLLOW NOW ─── */
useEffect(()=>{
if(!followNow) return;
const id=setInterval(()=>{
const now=1440+new Date().getHours()*60+new Date().getMinutes();
setCursor(now);

if(scrollRef.current){
scrollRef.current.scrollTo({
left:xOf(now)-window.innerWidth/2,
behavior:"smooth"
});
}

},30000);
return()=>clearInterval(id);
},[followNow]);

/* ─── DRAG SCRUB ─── */
function onDown(e){
dragging.current=true;
}

function onMove(e){
if(!dragging.current) return;

const rect=scrollRef.current.getBoundingClientRect();
const x=e.clientX-rect.left+scrollRef.current.scrollLeft;

const am=(x-40)/0.3;
setCursor(am);
setFollowNow(false);
}

function onUp(){
dragging.current=false;
}

/* ─── GRAPH PATH ─── */
let path="";
for(let i=0;i<3000;i+=10){
const x=xOf(i);
const y=yOf(tide(i));
path+=i===0?`M${x},${y}`:` L${x},${y}`;
}

/* ─── BUOY PATH ─── */
let buoyPast="",buoyFuture="";
const now=1440+new Date().getHours()*60+new Date().getMinutes();

for(let i=0;i<3000;i+=20){
const x=xOf(i);
const y=200-buoy(i)*20;

if(i<=now){
buoyPast+=i===0?`M${x},${y}`:` L${x},${y}`;
}else{
buoyFuture+=i===now?`M${x},${y}`:` L${x},${y}`;
}
}

const curX=xOf(cursor);
const curY=yOf(tide(cursor));

return(
<div style={{fontFamily:"Nunito",maxWidth:480,margin:"auto"}}>

{/* HEADER */}
<div style={{padding:16,fontWeight:900,fontSize:20}}>
🌊 TideTrack
</div>

{/* VALUE */}
<div style={{padding:"0 16px"}}>
<div style={{fontSize:40}}>
{tide(cursor).toFixed(2)} ft
</div>

<button onClick={()=>setFollowNow(true)}>
Now
</button>
</div>

{/* CHART */}
<div
ref={scrollRef}
onPointerDown={onDown}
onPointerMove={onMove}
onPointerUp={onUp}
style={{
overflowX:"auto",
cursor:"grab"
}}
>

<svg width={3000} height={260}>

{/* TIDE */}
<path d={path} stroke={C.tide} fill="none" strokeWidth="2"/>

{/* BUOY */}
<path d={buoyPast} stroke={C.buoy[0]} strokeWidth="2" fill="none"/>
<path d={buoyFuture} stroke={C.buoy[0]} strokeWidth="1.5" strokeDasharray="5,5" opacity="0.4" fill="none"/>

{/* NOW */}
<line x1={xOf(now)} x2={xOf(now)} y1="0" y2="260" stroke={C.now}/>

{/* CURSOR */}
<line x1={curX} x2={curX} y1="0" y2="260" stroke="#999" strokeDasharray="4,4"/>

<circle cx={curX} cy={curY} r="6" fill="#fff" stroke={C.tide} strokeWidth="3"/>

</svg>
</div>

</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
